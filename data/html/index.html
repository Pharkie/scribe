<!DOCTYPE html>
<html lang="en" class="bg-gray-50 text-gray-900">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scribe</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="flex flex-col min-h-screen justify-between py-8 px-4 font-sans">
    <!-- Header with title -->
    <header class="w-full max-w-4xl mx-auto flex justify-center items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Scribe</h1>
    </header>

    <main class="w-full max-w-4xl mx-auto flex-1 space-y-6">
        <!-- Main Printer Interface -->
        <div class="bg-white shadow-2xl rounded-3xl p-8 border border-gray-100">
            <form id="printer-form" onsubmit="handleSubmit(event)" class="space-y-6">
                <!-- Printer Selection -->
                <div class="space-y-3">
                    <label class="block text-sm font-medium text-gray-700">Print to:</label>
                    <div id="printer-selection" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                        <!-- Printer options will be populated dynamically -->
                    </div>
                    <input type="hidden" id="printer-target" name="printer-target" value="local-direct">
                </div>

                <!-- Message Input -->
                <div class="space-y-2">
                    <label for="message-textarea" class="block text-sm font-medium text-gray-700">Message:</label>
                    <textarea name="message" id="message-textarea" oninput="handleInput(this)"
                        onkeydown="handleTextareaKeydown(event)" placeholder="Type your message…"
                        class="w-full p-4 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent resize-none text-gray-800 placeholder-gray-400"
                        rows="4" required></textarea>
                    <div id="char-counter" class="text-sm text-gray-500 text-right"></div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-button"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-medium transition-all duration-200 hover:scale-[1.02] hover:shadow-lg">
                    🖨️ Scribe
                </button>
            </form>

            <!-- Quick Actions -->
            <div class="space-y-4 mt-8">
                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">
                    <button onclick="sendQuickAction('riddle')"
                        class="flex flex-col items-center px-4 py-3 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded-xl transition-all duration-200 hover:scale-105 hover:shadow-md">
                        <span class="text-2xl mb-1">🧩</span>
                        <span class="text-sm font-medium">Riddle</span>
                    </button>
                    <button onclick="sendQuickAction('joke')"
                        class="flex flex-col items-center px-4 py-3 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 rounded-xl transition-all duration-200 hover:scale-105 hover:shadow-md">
                        <span class="text-2xl mb-1">😄</span>
                        <span class="text-sm font-medium">Joke</span>
                    </button>
                    <button onclick="sendQuickAction('quote')"
                        class="flex flex-col items-center px-4 py-3 bg-purple-50 hover:bg-purple-100 text-purple-700 border border-purple-200 rounded-xl transition-all duration-200 hover:scale-105 hover:shadow-md">
                        <span class="text-2xl mb-1">💭</span>
                        <span class="text-sm font-medium">Quote</span>
                    </button>
                    <button onclick="sendQuickAction('quiz')"
                        class="flex flex-col items-center px-4 py-3 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded-xl transition-all duration-200 hover:scale-105 hover:shadow-md">
                        <span class="text-2xl mb-1">🧠</span>
                        <span class="text-sm font-medium">Quiz</span>
                    </button>
                    <button onclick="sendQuickAction('print-test')"
                        class="flex flex-col items-center px-4 py-3 bg-gray-50 hover:bg-gray-100 text-gray-700 border border-gray-200 rounded-xl transition-all duration-200 hover:scale-105 hover:shadow-md">
                        <span class="text-2xl mb-1">🧪</span>
                        <span class="text-sm font-medium">Test</span>
                    </button>
                </div>
            </div>

            <!-- Success Messages -->
            <div id="success-message"
                class="text-green-600 font-semibold text-lg mt-6 text-center min-h-[2rem] flex items-center justify-center opacity-0">
                ✅ Action completed successfully!
            </div>
        </div>

        <!-- Unbidden Ink Section (Collapsible) -->
        <div class="bg-white shadow-xl rounded-3xl border border-gray-100 overflow-hidden">
            <!-- Header with Enable Toggle -->
            <div class="p-6 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">🪄</span>
                    <div class="flex items-center space-x-4">
                        <h3 class="text-lg font-semibold text-gray-800">Unbidden Ink</h3>
                        <div class="flex items-center space-x-2">
                            <label class="text-sm font-medium text-gray-700">Enable</label>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="unbidden-ink-enabled" name="enabled" class="sr-only peer"
                                    onchange="toggleUnbiddenInkSettings()">
                                <div
                                    class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-purple-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600">
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
                <!-- Settings Collapsible Button -->
                <button onclick="toggleUnbiddenInkSection()"
                    class="flex items-center space-x-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors duration-200">
                    <span class="text-sm font-medium text-gray-700">Settings</span>
                    <svg id="unbidden-ink-arrow"
                        class="w-4 h-4 text-gray-400 transform transition-transform duration-200" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>
            </div>

            <div id="unbidden-ink-content" class="hidden px-6 pb-6 border-t border-gray-100">
                <form id="unbiddeninksettings-form" class="space-y-6 mt-6">
                    <!-- Settings Details (hidden when disabled) -->
                    <div id="unbidden-ink-details" class="space-y-6">
                        <!-- Frequency Slider -->
                        <div class="space-y-3">
                            <label for="frequency" class="block text-sm font-medium text-gray-700">
                                Frequency: <span id="frequency-display" class="text-purple-600 font-semibold">Every 60
                                    minutes</span>
                            </label>
                            <input type="range" id="frequency" name="frequency" min="15" max="480" value="60" step="15"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer slider"
                                oninput="updateFrequencyDisplay()">
                            <div class="flex justify-between text-xs text-gray-500">
                                <span>15 min</span>
                                <span>8 hours</span>
                            </div>
                        </div>

                        <!-- Active Hours -->
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label for="start-hour" class="block text-sm font-medium text-gray-700">Start
                                    time</label>
                                <select id="start-hour" name="start-hour"
                                    class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent text-gray-800">
                                    <!-- Options will be populated by JavaScript -->
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label for="end-hour" class="block text-sm font-medium text-gray-700">End time</label>
                                <select id="end-hour" name="end-hour"
                                    class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent text-gray-800">
                                    <!-- Options will be populated by JavaScript -->
                                </select>
                            </div>
                        </div>

                        <!-- Custom Prompt -->
                        <div class="space-y-2">
                            <label for="custom-prompt" class="block text-sm font-medium text-gray-700">Custom prompt
                                (optional)</label>

                            <!-- Preset Buttons -->
                            <div class="grid grid-cols-2 gap-2 mb-3">
                                <button type="button" onclick="loadPromptPreset('motivation')"
                                    class="px-3 py-2 bg-blue-100 hover:bg-blue-200 text-blue-700 text-xs rounded-lg font-medium transition-all duration-200 hover:scale-105">
                                    ✨ Motivation
                                </button>
                                <button type="button" onclick="loadPromptPreset('doctorwho')"
                                    class="px-3 py-2 bg-green-100 hover:bg-green-200 text-green-700 text-xs rounded-lg font-medium transition-all duration-200 hover:scale-105">
                                    🎭 Doctor Who
                                </button>
                                <button type="button" onclick="loadPromptPreset('wonderful')"
                                    class="px-3 py-2 bg-yellow-100 hover:bg-yellow-200 text-yellow-700 text-xs rounded-lg font-medium transition-all duration-200 hover:scale-105">
                                    🌟 Wonderful
                                </button>
                                <button type="button" onclick="loadPromptPreset('creative')"
                                    class="px-3 py-2 bg-pink-100 hover:bg-pink-200 text-pink-700 text-xs rounded-lg font-medium transition-all duration-200 hover:scale-105">
                                    🎨 Creative
                                </button>
                            </div>

                            <textarea id="custom-prompt" name="custom-prompt"
                                placeholder="Override the default AI prompt with your own creative instructions..."
                                class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent resize-none text-gray-800 placeholder-gray-400"
                                rows="3" oninput="updatePromptCharCount()"></textarea>
                            <div class="text-xs text-gray-500 text-right">
                                <span id="prompt-char-count">500 characters remaining</span>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="flex space-x-3 pt-4">
                            <button type="button" onclick="saveUnbiddenInkSettings()"
                                class="flex-1 bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg font-medium transition-all duration-200 hover:scale-[1.02] hover:shadow-lg">
                                💾 Save Settings
                            </button>
                            <button type="button" onclick="testUnbiddenInk()"
                                class="px-6 py-3 bg-purple-100 hover:bg-purple-200 text-purple-700 border border-purple-200 rounded-lg font-medium transition-all duration-200 hover:scale-105 hover:shadow-md">
                                🖨️ Print Sample
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="text-sm text-gray-400 mt-8 text-center space-y-3">
        <a href="/diagnostics.html"
            class="inline-block px-4 py-2 bg-slate-500 hover:bg-slate-600 text-white text-sm rounded-lg font-medium transition-all duration-200 hover:scale-105 hover:shadow-lg">
            📊 Diagnostics
        </a>
        <div>
            Designed with love by <a href="https://urbancircles.club" target="_blank"
                class="text-gray-500 hover:text-gray-700 transition-colors duration-200 underline decoration-gray-300 hover:decoration-gray-500 underline-offset-2">Peter
                / Urban Circles</a>
        </div>
        <div>
            Extended with joy by <a href="https://github.com/Pharkie/scribe" target="_blank"
                class="text-gray-500 hover:text-gray-700 transition-colors duration-200 underline decoration-gray-300 hover:decoration-gray-500 underline-offset-2">Pharkie</a>
        </div>
        <div>
            Quotes from <a href="https://zenquotes.io/" target="_blank"
                class="text-gray-500 hover:text-gray-700 transition-colors duration-200 underline decoration-gray-300 hover:decoration-gray-500 underline-offset-2">ZenQuotes
                API</a>
        </div>
    </footer>

    <!-- Load modular JavaScript files in dependency order -->
    <script src="/js/config.js"></script>
    <script src="/js/messaging.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/unbiddenink.js"></script>
    <script src="/js/main.js"></script>
</body>

</html>
