<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Settings - Scribe Evolution</title>
    
    <!-- CSS Assets -->
    <link rel="stylesheet" href="/css/settings.css">
    
    <!-- Common JS -->
    <script src="/js/app-common.js"></script>
    
    <!-- WiFi page bundle (includes settings-api) -->
    <script src="/js/page-settings-wifi.js"></script>
    
    <!-- Alpine.js (load last) -->
    <script defer src="/js/alpine.js"></script>
</head>
<body class="flex flex-col min-h-screen justify-between py-8 px-4 font-sans bg-gray-50 dark:bg-gray-900 transition-colors duration-200" x-data="$store.settingsWifi">
    <main class="w-full max-w-4xl mx-auto flex-1">
        <!-- Header with title and back button -->
        <header class="w-full max-w-6xl mx-auto flex items-center mb-6 gap-4">
            <!-- Back button spacer -->
            <div class="flex-1">
                <a href="/settings.html" class="flex items-center space-x-1 px-2 py-1.5 bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 border border-gray-200 dark:border-gray-600 rounded-full transition-all duration-200 hover:scale-105 hover:shadow-md">
                    <svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    <span class="text-xs sm:text-sm font-medium">Back</span>
                </a>
            </div>

            <!-- Centered title with WiFi icon -->
            <div class="flex-1 flex justify-center">
                <h1 class="text-3xl sm:text-4xl font-bold text-gray-800 dark:text-gray-100 flex items-center space-x-1 sm:space-x-2">
                    <svg class="w-7 h-7 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 717.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"></path>
                    </svg>
                    <span>WiFi Settings</span>
                </h1>
            </div>

            <!-- Right spacer -->
            <div class="flex-1"></div>
        </header>
        

        <!-- Error State -->
        <div x-show="error" class="shadow-2xl rounded-3xl p-8 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800" x-transition>
            <div class="text-center">
                <svg class="w-10 h-10 mb-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"></path>
                </svg>
                <h3 class="text-lg font-semibold text-red-800 dark:text-red-200 mb-2">Configuration Loading Error</h3>
                <p class="text-red-600 dark:text-red-300 mb-4" x-text="error"></p>
                <p class="text-sm text-red-500 dark:text-red-400">Please check the system and try refreshing the page.</p>
                <button @click="window.location.reload()" class="bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200">
                    Retry
                </button>
            </div>
        </div>

        <!-- WiFi Settings Form -->
        <template x-if="!loading && !error">
            <div x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 transform translate-y-4"
                x-transition:enter-end="opacity-100 transform translate-y-0">
            <div class="space-y-6">
                <form @submit.prevent="saveConfiguration" class="space-y-8">
                    
                    <!-- WiFi Network Configuration Section -->
                    <div class="bg-white dark:bg-gray-800 shadow-lg hover:shadow-xl rounded-2xl p-6 border-t-3 border-green-600 transition-shadow duration-200">
                        <h2 class="text-2xl font-bold mb-6 flex items-center space-x-2 text-green-600 dark:text-green-400">WiFi Network Configuration</h2>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <!-- WiFi Network Selection -->
                            <div class="space-y-2">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">WiFi Network (Signal Strength):</label>

                                <!-- Network Selection Dropdown -->
                                <select 
                                    @change="selectNetwork($event.target.value)"
                                    :disabled="wifiScan.dropdownDisabled" 
                                    :class="{
                                        'w-full p-3 rounded-xl border border-gray-200 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent text-gray-800 dark:text-gray-100 bg-white dark:bg-gray-700': true,
                                        'opacity-60 cursor-not-allowed': wifiScan.dropdownDisabled,
                                        'bg-green-50 dark:bg-green-900/20 border-green-300 dark:border-green-700': wifiScan.isScanning
                                    }" 
                                    x-model="wifiScan.selectedNetwork"
                                    x-effect="
                                        if (wifiScan.selectedNetwork !== null && wifiScan.options.length > 0) {
                                            $nextTick(() => $el.value = wifiScan.selectedNetwork);
                                        }
                                    "
                                >
                                    <template x-for="option in wifiScan.options" :key="option.value">
                                        <option :value="option.value" :disabled="option.disabled" x-text="option.label"></option>
                                    </template>
                                </select>

                                <!-- Manual SSID Input (reactive display) -->
                                <div x-show="wifiScan.showManualEntry" class="mt-2"
                                    x-transition:enter="transition ease-out duration-200"
                                    x-transition:enter-start="opacity-0 transform scale-95"
                                    x-transition:enter-end="opacity-100 transform scale-100">
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Network Name (SSID):</label>
                                    <input 
                                        type="text" 
                                        placeholder="Enter WiFi network name"
                                        class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent text-gray-800 dark:text-gray-100 bg-white dark:bg-gray-700" 
                                        x-model="config.device.wifi.ssid"
                                    >
                                </div>

                                <!-- WiFi Scan Status/Error Messages -->
                                <div x-show="wifiScan.isScanning" class="text-xs text-green-600 dark:text-green-400 flex items-center">
                                    <div class="animate-spin rounded-full border-b-2 h-3 w-3 border-green-500 mr-2"></div>
                                    Scanning networks...
                                </div>
                                <div x-show="!wifiScan.isScanning && wifiScan.hasScanned && !wifiScan.error" class="text-xs text-green-600 dark:text-green-400">
                                    Networks found, select above
                                </div>
                                <div x-show="wifiScan.error" class="text-xs text-red-600 dark:text-red-400" x-text="wifiScan.error"></div>

                                <!-- Validation Error Display -->
                                <p x-show="validation.errors['wifi.ssid']" class="text-xs text-red-600 dark:text-red-400" x-text="validation.errors['wifi.ssid']"></p>
                            </div>
                            
                            <!-- WiFi Password -->
                            <div class="space-y-2">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">WiFi Password:</label>
                                <input 
                                    type="password" 
                                    class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent text-gray-800 dark:text-gray-100 bg-white dark:bg-gray-700"
                                    x-model="config.device.wifi.password"
                                    @input="trackWifiPasswordChange($event.target.value)"
                                    placeholder="Enter WiFi password"
                                >
                            </div>

                            <!-- Connection Timeout -->
                            <div class="space-y-2">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Connection Timeout (seconds):</label>
                                <input 
                                    type="number" 
                                    min="5" 
                                    max="60" 
                                    class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent text-gray-800 dark:text-gray-100 bg-white dark:bg-gray-700"
                                    :value="Math.floor(config.device.wifi.connect_timeout / 1000)"
                                    @input="config.device.wifi.connect_timeout = parseInt($el.value) * 1000"
                                >
                                <p x-show="validation.errors['wifi.connect_timeout']" class="text-xs text-red-600 dark:text-red-400" x-text="validation.errors['wifi.connect_timeout']"></p>
                                <p x-show="!validation.errors['wifi.connect_timeout']" class="text-xs text-gray-500 dark:text-gray-400">
                                    Time to wait before falling back to AP mode (5-60 seconds)
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Current WiFi Status Section -->
                    <div class="bg-white dark:bg-gray-800 shadow-lg hover:shadow-xl rounded-2xl p-6 border-t-3 border-green-600 transition-shadow duration-200">
                        <h2 class="text-2xl font-bold mb-6 flex items-center space-x-2 text-green-600 dark:text-green-400">
                            <span x-text="config.device?.wifi?.status?.ap_mode ? 'AP Setup Mode' : 'Current WiFi Status'"></span>
                        </h2>
                        
                        <!-- AP Mode Status -->
                        <div x-show="config.device?.wifi?.status?.ap_mode" class="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-700 rounded-lg p-4">
                            <div class="text-sm space-y-2">
                                <div class="text-blue-800 dark:text-blue-300 font-medium">Device is in setup mode - connect to WiFi network below</div>
                                <div>
                                    <span class="font-medium text-gray-700 dark:text-gray-300">Setup Network:</span>
                                    <span class="text-gray-900 dark:text-gray-200" x-text="config.device?.wifi?.fallback_ap_ssid"></span>
                                </div>
                                <div>
                                    <span class="font-medium text-gray-700 dark:text-gray-300">Setup IP:</span>
                                    <span class="text-gray-900 dark:text-gray-200" x-text="config.device?.wifi?.status?.ip_address || '192.168.4.1'"></span>
                                </div>
                                <div>
                                    <span class="font-medium text-gray-700 dark:text-gray-300">MAC Address:</span>
                                    <span class="text-gray-900 dark:text-gray-200" x-text="config.device?.wifi?.status?.mac_address || '-'"></span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Normal WiFi Status -->
                        <div x-show="!config.device?.wifi?.status?.ap_mode" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <div class="text-sm">
                                    <span class="font-medium text-gray-700 dark:text-gray-300">IP Address:</span>
                                    <span class="text-gray-900 dark:text-gray-200" x-text="config.device?.wifi?.status?.ip_address || '-'"></span>
                                </div>
                                <div class="text-sm">
                                    <span class="font-medium text-gray-700 dark:text-gray-300">Signal Strength:</span>
                                    <span class="text-gray-900 dark:text-gray-200" x-text="config.device?.wifi?.status?.signal_strength || '-'"></span>
                                </div>
                                <div class="text-sm">
                                    <span class="font-medium text-gray-700 dark:text-gray-300">MAC Address:</span>
                                    <span class="text-gray-900 dark:text-gray-200" x-text="config.device?.wifi?.status?.mac_address || '-'"></span>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <div class="text-sm">
                                    <span class="font-medium text-gray-700 dark:text-gray-300">Gateway:</span>
                                    <span class="text-gray-900 dark:text-gray-200" x-text="config.device?.wifi?.status?.gateway || '-'"></span>
                                </div>
                                <div class="text-sm">
                                    <span class="font-medium text-gray-700 dark:text-gray-300">DNS:</span>
                                    <span class="text-gray-900 dark:text-gray-200" x-text="config.device?.wifi?.status?.dns || '-'"></span>
                                </div>
                                <div class="text-sm">
                                    <span class="font-medium text-gray-700 dark:text-gray-300">mDNS Hostname:</span>
                                    <span class="text-gray-900 dark:text-gray-200" x-text="config.device?.mdns || '-'"></span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- WiFi Warning Message -->
                        <div class="mt-4 pt-3 border-t border-gray-200 dark:border-gray-600">
                            <div class="flex items-start space-x-2 text-xs text-gray-500 dark:text-gray-400">
                                <svg class="w-4 h-4 text-yellow-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"></path>
                                </svg>
                                <div>
                                    <p>WiFi changes restart device. Fallback AP: 
                                        <span class="font-mono font-medium text-gray-600 dark:text-gray-300" x-text="config?.device?.wifi?.fallback_ap_ssid || 'Scribe-setup'"></span> / 
                                        <span class="font-mono font-medium text-gray-600 dark:text-gray-300" x-text="config?.device?.wifi?.fallback_ap_password || 'scribe123'"></span>
                                    </p>
                                    <button 
                                        @click="printAPDetails()" 
                                        :disabled="apPrintStatus === 'scribing'"
                                        class="mt-2 px-3 py-1 text-xs bg-gray-500 hover:bg-gray-600 dark:bg-gray-600 dark:hover:bg-gray-500 text-white rounded transition-colors duration-200 inline-flex items-center gap-1 disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path>
                                        </svg>
                                        <span x-text="apPrintButtonText"></span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="flex justify-center gap-6 pt-6">
                        <button type="button" @click="cancelConfiguration"
                            class="px-8 py-4 bg-gray-500 hover:bg-gray-600 text-white font-medium rounded-xl transition-colors duration-200">
                            Cancel
                        </button>
                        <button type="submit" :disabled="saving" class="px-8 py-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl transition-colors duration-200 shadow-lg hover:shadow-xl transform hover:scale-105"
                            :class="{ 'opacity-50 cursor-not-allowed': saving }">
                            <span x-show="!saving" class="flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 717.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"></path>
                                </svg>
                                Save
                            </span>
                            <span x-show="saving">
                                <div class="flex items-center space-x-2">
                                    <div
                                        class="animate-spin rounded-full border-2 border-white border-t-transparent w-4 h-4">
                                    </div>
                                    <span>Saving...</span>
                                </div>
                            </span>
                        </button>
                    </div>
                </form>
            </div>
            </div>
        </template>
    </main>
</body>
</html>
