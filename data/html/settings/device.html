<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Settings - Scribe Evolution</title>
    
    <!-- CSS Assets -->
    <link rel="stylesheet" href="/css/settings.min.css">
    
    <!-- Common JS -->
    <script src="/js/app-common.min.js"></script>
    
    <!-- Device page bundle (includes settings-api) -->
    <script src="/js/page-settings-device.min.js"></script>
    
    <!-- Alpine.js (load last) -->
    <script defer src="/js/alpine.min.js"></script>
</head>
<body class="page-body" x-data="$store.settingsDevice">
    <main class="page-main">
        <!-- Header with title and back button -->
        <header class="page-header">
            <!-- Back button spacer -->
            <div class="header-spacer">
                <a href="/settings.html" class="back-button">
                    <svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    <span class="text-xs sm:text-sm font-medium">Back to Settings</span>
                </a>
            </div>

            <!-- Centered title with device icon -->
            <div class="header-center">
                <h1 class="page-title">
                    <svg class="w-7 h-7 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.25 3v1.5M4.5 8.25H3m18 0h-1.5M4.5 12H3m18 0h-1.5m-16.5 3.75H3m18 0h-1.5M8.25 19.5V21M12 3v1.5m0 15V21m3.75-18v1.5m0 15V21m-9-1.5h10.5a2.25 2.25 0 002.25-2.25V6.75a2.25 2.25 0 00-2.25-2.25H6.75A2.25 2.25 0 004.5 6.75v10.5a2.25 2.25 0 002.25 2.25z"></path>
                    </svg>
                    <span>Device Settings</span>
                </h1>
            </div>

            <!-- Right spacer -->
            <div class="header-spacer"></div>
        </header>
        
        <!-- Loading State -->
        <div x-show="loading" class="text-center py-8">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
            <p class="mt-2 text-gray-600 dark:text-gray-400">Loading device settings...</p>
        </div>

        <!-- Error State -->
        <div x-show="error" class="settings-card bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800" x-transition>
            <div class="text-center">
                <svg class="w-10 h-10 mb-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"></path>
                </svg>
                <h3 class="text-lg font-semibold text-red-800 dark:text-red-200 mb-2">Configuration Loading Error</h3>
                <p class="text-red-600 dark:text-red-300 mb-4" x-text="error"></p>
                <p class="text-sm text-red-500 dark:text-red-400">Please check the system and try refreshing the page.</p>
                <button @click="window.location.reload()" class="mt-4 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors">
                    Retry
                </button>
            </div>
        </div>

        <!-- Device Settings Form -->
        <template x-if="!loading && !error">
            <div class="space-y-6">
                <form @submit.prevent="saveConfiguration" class="space-y-8">
                    
                    <!-- Device Identity Section -->
                    <div class="settings-card settings-card-blue">
                        <h2 class="settings-card-header settings-card-header-blue">Device Identity</h2>
                    
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Device Owner -->
                            <div>
                                <label class="form-label">Device Owner:</label>
                                <input 
                                    type="text" 
                                    x-model="config.device.owner"
                                    class="input-standard"
                                    placeholder="Enter device owner name"
                                    required
                                >
                            </div>

                            <!-- Timezone -->
                            <div>
                                <label class="form-label">Timezone (IANA):</label>
                                <input 
                                    type="text" 
                                    x-model="config.device.timezone"
                                    class="input-standard"
                                    placeholder="e.g. America/New_York, Europe/London"
                                    required
                                >
                                <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">Use format: Continent/City (e.g., America/Chicago, Europe/London, Europe/Paris, Asia/Tokyo)</p>
                            </div>
                        </div>
                    </div>

                    <!-- GPIO Pins Section -->
                    <div class="settings-card settings-card-blue">
                        <h2 class="settings-card-header settings-card-header-blue">GPIO Pins</h2>
                    
                    <!-- GPIO Assignment Interface -->
                    <div class="space-y-6">
                        
                        <!-- Responsive Card Grid: 3 columns on desktop, 1 column on mobile -->
                        <div class="space-y-6">
                            <!-- First Row: Printer, LED Strip, Button 1 -->
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                <!-- Printer Card -->
                                <div class="bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl p-5 shadow-lg">
                                    <div class="text-center mb-4">
                                        <h4 class="font-semibold text-gray-900 dark:text-white text-lg mb-2">Printer</h4>
                                    </div>
                                    <div class="grid grid-cols-4 gap-3">
                                        <template x-for="pin in gpio.safePins.filter(p => p !== -1).sort((a,b) => a-b)" :key="'printer-' + pin">
                                            <button x-show="!usedGpioPins.has(pin) || config.device.printerTxPin === pin" type="button" @click="config.device.printerTxPin = pin"
                                                :class="config.device.printerTxPin === pin ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-600 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-500 active:bg-gray-400 dark:active:bg-gray-700'"
                                                class="h-12 rounded-lg font-mono text-sm font-semibold transition-all duration-200 transform active:scale-95 shadow-md">
                                                <div x-text="pin"></div>
                                            </button>
                                        </template>
                                    </div>
                                </div>

                                <!-- LED Strip Card -->
                                <div class="bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl p-5 shadow-lg">
                                    <div class="text-center mb-4">
                                        <h4 class="font-semibold text-gray-900 dark:text-white text-lg mb-2">LED Strip</h4>
                                    </div>
                                    <div class="grid grid-cols-4 gap-3">
                                        <button type="button" @click="config.leds.pin = -1" :class="config.leds?.pin === -1 ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-600 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-500 active:bg-gray-400 dark:active:bg-gray-700'"
                                            class="h-12 rounded-lg text-sm font-semibold transition-all duration-200 transform active:scale-95 shadow-md">
                                            OFF
                                        </button>
                                        <template x-for="pin in gpio.safePins.filter(p => p !== -1).sort((a,b) => a-b)" :key="'led-' + pin">
                                            <button x-show="!usedGpioPins.has(pin) || config.leds?.pin === pin" type="button" @click="config.leds.pin = pin"
                                                :class="config.leds?.pin === pin ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-600 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-500 active:bg-gray-400 dark:active:bg-gray-700'"
                                                class="h-12 rounded-lg font-mono text-sm font-semibold transition-all duration-200 transform active:scale-95 shadow-md">
                                                <div x-text="pin"></div>
                                            </button>
                                        </template>
                                    </div>
                                </div>

                                <!-- Button 1 Card -->
                                <div class="bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl p-5 shadow-lg">
                                    <div class="text-center mb-4">
                                        <h4 class="font-semibold text-gray-900 dark:text-white text-lg mb-2">Button 1</h4>
                                    </div>
                                    <div class="grid grid-cols-4 gap-3">
                                        <button type="button" @click="config.buttons.button1.gpio = -1" :class="config.buttons.button1?.gpio === -1 ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-600 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-500 active:bg-gray-400 dark:active:bg-gray-700'"
                                            class="h-12 rounded-lg text-sm font-semibold transition-all duration-200 transform active:scale-95 shadow-md">
                                            OFF
                                        </button>
                                        <template x-for="pin in gpio.safePins.filter(p => p !== -1).sort((a,b) => a-b)" :key="'button1-' + pin">
                                            <button x-show="!usedGpioPins.has(pin) || config.buttons.button1?.gpio === pin" type="button" @click="config.buttons.button1.gpio = pin"
                                                :class="config.buttons.button1?.gpio === pin ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-600 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-500 active:bg-gray-400 dark:active:bg-gray-700'"
                                                class="h-12 rounded-lg font-mono text-sm font-semibold transition-all duration-200 transform active:scale-95 shadow-md">
                                                <div x-text="pin"></div>
                                            </button>
                                        </template>
                                    </div>
                                </div>
                            </div>
                            </div>

                            <!-- Second Row: Button 2, Button 3, Button 4 -->
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                <!-- Button 2 Card -->
                            <div class="bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl p-5 shadow-lg">
                                    <div class="text-center mb-4">
                                        <h4 class="font-semibold text-gray-900 dark:text-white text-lg mb-2">Button 2</h4>
                                    </div>
                                    <div class="grid grid-cols-4 gap-3">
                                        <button type="button" @click="config.buttons.button2.gpio = -1" :class="config.buttons.button2?.gpio === -1 ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-600 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-500 active:bg-gray-400 dark:active:bg-gray-700'"
                                            class="h-12 rounded-lg text-sm font-semibold transition-all duration-200 transform active:scale-95 shadow-md">
                                            OFF
                                        </button>
                                        <template x-for="pin in gpio.safePins.filter(p => p !== -1).sort((a,b) => a-b)" :key="'button2-' + pin">
                                            <button x-show="!usedGpioPins.has(pin) || config.buttons.button2?.gpio === pin" type="button" @click="config.buttons.button2.gpio = pin"
                                                :class="config.buttons.button2?.gpio === pin ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-600 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-500 active:bg-gray-400 dark:active:bg-gray-700'"
                                                class="h-12 rounded-lg font-mono text-sm font-semibold transition-all duration-200 transform active:scale-95 shadow-md">
                                                <div x-text="pin"></div>
                                            </button>
                                        </template>
                                    </div>
                                </div>

                                <!-- Button 3 Card -->
                            <div class="bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl p-5 shadow-lg">
                                    <div class="text-center mb-4">
                                        <h4 class="font-semibold text-gray-900 dark:text-white text-lg mb-2">Button 3</h4>
                                    </div>
                                    <div class="grid grid-cols-4 gap-3">
                                        <button type="button" @click="config.buttons.button3.gpio = -1" :class="config.buttons.button3?.gpio === -1 ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-600 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-500 active:bg-gray-400 dark:active:bg-gray-700'"
                                            class="h-12 rounded-lg text-sm font-semibold transition-all duration-200 transform active:scale-95 shadow-md">
                                            OFF
                                        </button>
                                        <template x-for="pin in gpio.safePins.filter(p => p !== -1).sort((a,b) => a-b)" :key="'button3-' + pin">
                                            <button x-show="!usedGpioPins.has(pin) || config.buttons.button3?.gpio === pin" type="button" @click="config.buttons.button3.gpio = pin"
                                                :class="config.buttons.button3?.gpio === pin ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-600 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-500 active:bg-gray-400 dark:active:bg-gray-700'"
                                                class="h-12 rounded-lg font-mono text-sm font-semibold transition-all duration-200 transform active:scale-95 shadow-md">
                                                <div x-text="pin"></div>
                                            </button>
                                        </template>
                                    </div>
                                </div>

                                <!-- Button 4 Card -->
                            <div class="bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl p-5 shadow-lg">
                                    <div class="text-center mb-4">
                                        <h4 class="font-semibold text-gray-900 dark:text-white text-lg mb-2">Button 4</h4>
                                    </div>
                                    <div class="grid grid-cols-4 gap-3">
                                        <button type="button" @click="config.buttons.button4.gpio = -1" :class="config.buttons.button4?.gpio === -1 ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-600 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-500 active:bg-gray-400 dark:active:bg-gray-700'"
                                            class="h-12 rounded-lg text-sm font-semibold transition-all duration-200 transform active:scale-95 shadow-md">
                                            OFF
                                        </button>
                                        <template x-for="pin in gpio.safePins.filter(p => p !== -1).sort((a,b) => a-b)" :key="'button4-' + pin">
                                            <button x-show="!usedGpioPins.has(pin) || config.buttons.button4?.gpio === pin" type="button" @click="config.buttons.button4.gpio = pin"
                                                :class="config.buttons.button4?.gpio === pin ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-600 text-gray-900 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-500 active:bg-gray-400 dark:active:bg-gray-700'"
                                                class="h-12 rounded-lg font-mono text-sm font-semibold transition-all duration-200 transform active:scale-95 shadow-md">
                                                <div x-text="pin"></div>
                                            </button>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                    <!-- Action Buttons -->
                    <div class="flex justify-center gap-4 pt-6">
                        <button type="button" @click="cancelConfiguration"
                            class="px-6 py-3 bg-gray-500 hover:bg-gray-600 text-white font-medium rounded-xl transition-colors duration-200">
                            Cancel
                        </button>
                        <button type="submit" :disabled="saving" class="btn-primary"
                            :class="{ 'opacity-50 cursor-not-allowed': saving }">
                            <span x-show="!saving" class="flex items-center">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                                </svg>
                                Save Device Settings
                            </span>
                            <span x-show="saving">
                                <div class="flex items-center space-x-2">
                                    <div
                                        class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin">
                                    </div>
                                    <span>Saving...</span>
                                </div>
                            </span>
                        </button>
                    </div>
                </form>
            </div>
        </template>
    </main>
</body>
</html>
