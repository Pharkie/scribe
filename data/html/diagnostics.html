<!DOCTYPE html>
<html lang="en" class="app-root">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Diagnostics - Scribe Evolution</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/css/diagnostics.min.css">
    <script src="/js/app-common.min.js"></script>
    <script src="/js/page-diagnostics.min.js"></script>
    <script src="/js/vendor.min.js" defer></script>
</head>

<body class="page-body" x-data="window.diagnosticsStoreInstance || {}">
    <main class="page-main">
        <header class="page-header">
            <div class="header-spacer">
                <button onclick="window.location.href='/'" class="back-button">
                    <svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                    <span class="text-xs sm:text-sm font-medium">Back</span>
                </button>
            </div>
            <div class="header-center">
                <h1 class="page-title">
                    <svg class="w-7 h-7 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437 1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008Z"></path>
                    </svg>
                    <span>Diagnostics</span>
                </h1>
            </div>
            <div class="header-spacer"></div>
        </header>

        <!-- Error State -->
        <div x-show="error" x-transition.opacity.duration.300ms class="text-center text-red-600 dark:text-red-400 mb-6">
            <svg class="w-8 h-8 mx-auto mb-4 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18 18 6M6 6l12 12" />
            </svg>
            <h3 class="text-lg font-semibold mb-2">Error Loading Diagnostics</h3>
            <p class="text-red-600 dark:text-red-400 mb-4" x-text="error"></p>
            <button @click="loadDiagnostics()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
                Retry
            </button>
        </div>

        <!-- Main Content - use x-if to prevent evaluation when loading -->
        <template x-if="!loading && !error">
            <div x-data="{ 
                ready: false, 
                progressReady: false,
                init() {
                    this.$nextTick(() => {
                        this.ready = true;
                        // Use requestAnimationFrame for smooth animation timing
                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => {
                                this.progressReady = true;
                            });
                        });
                    });
                }
            }" x-show="ready" x-transition.opacity.duration.300ms>
                <!-- Navigation -->
                <nav class="flex flex-wrap justify-center gap-2 mb-6">
                    <template x-for="section in sections" :key="section.id">
                        <button @click="showSection(section.id)" :class="getSectionClass(section.id)">
                            <span x-html="window.renderTabIcon ? window.renderTabIcon(section.icon) : section.icon"></span>
                            <span x-text="section.name"></span>
                        </button>
                    </template>
                </nav>

                <!-- Diagnostics Content -->
                <div class="space-y-6">
                    <!-- Microcontroller Section -->
                    <div x-show="currentSection === 'microcontroller-section'"
                         x-html="$store.diagnosticsPartials.load('microcontroller')"></div>

                    <!-- Logging Section -->
                    <div x-show="currentSection === 'logging-section'"
                         x-html="$store.diagnosticsPartials.load('logging')"></div>

                    <!-- Pages & Endpoints Section -->
                    <div x-show="currentSection === 'pages-endpoints-section'"
                         x-html="$store.diagnosticsPartials.load('pages-endpoints')"></div>

                    <!-- Runtime Configuration Section -->
                    <div x-show="currentSection === 'config-file-section'"
                         x-html="$store.diagnosticsPartials.load('config-file')"></div>

                    <!-- NVS Storage Section -->
                    <div x-show="currentSection === 'nvs-storage-section'"
                         x-html="$store.diagnosticsPartials.load('nvs-storage')"></div>
                </div>
            </div>
        </template>
    </main>

    <footer class="page-footer vertical-stack">
        <a href="/" class="link-button">
            <svg class="inline w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m3 12 2-2m0 0 7-7 7 7M5 10v10a1 1 0 0 0 1 1h3m0 0a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1m0 0h3a1 1 0 0 0 1-1V10M9 21v-6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v6"></path>
            </svg>
            Home
        </a>
        <div>
            Scribe Evolution was invented with love by <a href="https://urbancircles.club" target="_blank"
                class="footer-link">Peter
                / Urban Circles</a>
        </div>
        <div>
            Extended and upgraded with joy by <a href="https://github.com/Pharkie/scribe" target="_blank"
                class="footer-link">Pharkie</a>
        </div>
        <div>
            Quotes from <a href="https://zenquotes.io/" target="_blank" class="footer-link">ZenQuotes
                API</a>
        </div>
    </footer>
</body>

</html>
