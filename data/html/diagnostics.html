<!DOCTYPE html>
<html lang="en" class="app-root">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Diagnostics - Scribe Evolution</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/css/diagnostics.min.css">
    <script src="/js/page-diagnostics.min.js"></script>
    <script src="/js/vendor.min.js" defer></script>
    <script src="/js/app-common.min.js" defer></script>
    <script>
        // Register Alpine stores and components during initialization
        document.addEventListener('alpine:init', () => {
            // Create and register diagnostics store immediately, initialize it once
            const diagnosticsStore = initializeDiagnosticsStore();
            Alpine.store('diagnostics', diagnosticsStore);
            
            // Make store available globally for body x-data
            window.diagnosticsStoreInstance = diagnosticsStore;

            // Alpine.js store for loading diagnostics partials (clean version)
            Alpine.store('diagnosticsPartials', {
                cache: {},
                loading: {},
                load(name) {
                    if (this.cache[name]) return this.cache[name];
                    if (this.loading[name]) return '<div class="p-4 text-center text-gray-500">Loading...</div>';
                    
                    this.loading[name] = true;
                    fetch(`/html/partials/diagnostics/${name}.html`)
                        .then(response => {
                            if (!response.ok) throw new Error(`Failed to load partial: ${name}`);
                            return response.text();
                        })
                        .then(html => {
                            this.loading[name] = false;
                            this.cache[name] = html;
                            // Trigger reactivity by updating the store
                            Alpine.store('diagnosticsPartials', { ...this });
                        })
                        .catch(error => {
                            console.error('Error loading partial:', error);
                            this.cache[name] = `<div class="p-4 text-center text-red-500">Error loading ${name}</div>`;
                            this.loading[name] = false;
                            Alpine.store('diagnosticsPartials', { ...this });
                        });
                    
                    return '<div class="p-4 text-center text-gray-500">Loading...</div>';
                }
            });
        });
    </script>
</head>

<body class="page-body" x-data="window.diagnosticsStoreInstance || {}" x-init="init()">
    <main class="page-main">
        <header class="page-header">
            <div class="header-spacer">
                <button onclick="window.location.href='/'" class="back-button">
                    <svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                    <span class="text-xs sm:text-sm font-medium">Back</span>
                </button>
            </div>
            <div class="header-center">
                <h1 class="page-title">
                    <span class="text-4xl sm:text-5xl">🛠️</span>
                    <span>Diagnostics</span>
                </h1>
            </div>
            <div class="header-spacer"></div>
        </header>

        <!-- Error State -->
        <div x-show="error" x-transition.opacity.duration.300ms class="text-center text-red-600 dark:text-red-400 mb-6">
            <span class="text-2xl mb-4 block">❌</span>
            <h3 class="text-lg font-semibold mb-2">Error Loading Diagnostics</h3>
            <p class="text-red-600 dark:text-red-400 mb-4" x-text="error"></p>
            <button @click="loadDiagnostics()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
                Retry
            </button>
        </div>

        <!-- Main Content - use x-if to prevent evaluation when loading -->
        <template x-if="!loading && !error">
            <div x-data="{ 
                ready: false, 
                progressReady: false,
                init() {
                    this.$nextTick(() => {
                        this.ready = true;
                        // Use requestAnimationFrame for smooth animation timing
                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => {
                                this.progressReady = true;
                            });
                        });
                    });
                }
            }" x-show="ready" x-transition.opacity.duration.300ms>
                <!-- Navigation -->
                <nav class="flex flex-wrap justify-center gap-2 mb-6">
                    <template x-for="section in sections" :key="section.id">
                        <button @click="showSection(section.id)" :class="getSectionClass(section.id)"
                            x-text="`${section.icon} ${section.name}`">
                        </button>
                    </template>
                </nav>

                <!-- Diagnostics Content -->
                <div class="space-y-6">
                    <!-- Microcontroller Section -->
                    <div x-show="currentSection === 'microcontroller-section'"
                         x-html="$store.diagnosticsPartials.load('microcontroller')"></div>

                    <!-- Logging Section -->
                    <div x-show="currentSection === 'logging-section'"
                         x-html="$store.diagnosticsPartials.load('logging')"></div>

                    <!-- Pages & Endpoints Section -->
                    <div x-show="currentSection === 'pages-endpoints-section'"
                         x-html="$store.diagnosticsPartials.load('pages-endpoints')"></div>

                    <!-- Runtime Configuration Section -->
                    <div x-show="currentSection === 'config-file-section'"
                         x-html="$store.diagnosticsPartials.load('config-file')"></div>

                    <!-- NVS Storage Section -->
                    <div x-show="currentSection === 'nvs-storage-section'"
                         x-html="$store.diagnosticsPartials.load('nvs-storage')"></div>
                </div>
            </div>
        </template>
    </main>

    <footer class="page-footer vertical-stack">
        <a href="/" class="link-button">
            🏠 Home
        </a>
        <div>
            Scribe Evolution was invented with love by <a href="https://urbancircles.club" target="_blank"
                class="footer-link">Peter
                / Urban Circles</a>
        </div>
        <div>
            Extended and upgraded with joy by <a href="https://github.com/Pharkie/scribe" target="_blank"
                class="footer-link">Pharkie</a>
        </div>
        <div>
            Quotes from <a href="https://zenquotes.io/" target="_blank" class="footer-link">ZenQuotes
                API</a>
        </div>
    </footer>
</body>

</html>
