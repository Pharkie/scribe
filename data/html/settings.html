<!DOCTYPE html>
<html lang="en" class="app-root">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Settings - Scribe Evolution</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/css/settings.min.css">
    <script src="/js/page-settings.min.js"></script>
    <script src="/js/vendor.min.js" defer></script>
</head>

<body class="page-body" x-data="initializeSettingsStore()" x-init="init()">
    <main class="page-main">
        <!-- Header with title and back button -->
        <header class="page-header">
            <!-- Back button -->
            <div class="header-spacer">
                <button @click="window.location.href = '/'" class="back-button">
                    <svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                    <span class="text-xs sm:text-sm font-medium">Back</span>
                </button>
            </div>

            <!-- Centered title with settings icon -->
            <div class="header-center">
                <h1 class="page-title">
                    <span class="text-4xl sm:text-5xl">⚙️</span>
                    <span>Settings</span>
                </h1>
            </div>

            <!-- Right spacer -->
            <div class="header-spacer"></div>
        </header>

        <!-- Error State -->
        <div x-show="error" class="settings-card bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800"
            x-transition>
            <div class="text-center">
                <span class="text-4xl mb-4 block">⚠️</span>
                <h3 class="text-lg font-semibold text-red-800 dark:text-red-200 mb-2">Configuration Loading Error</h3>
                <p class="text-red-600 dark:text-red-300 mb-4" x-text="error"></p>
                <p class="text-sm text-red-500 dark:text-red-400">Please check the system and try refreshing the page.
                </p>
            </div>
        </div>

        <!-- Main Content - use x-if to prevent evaluation when loading -->
        <template x-if="!loading && !error">
            <div x-data="{ show: false }" x-init="$nextTick(() => show = true)" x-show="show"
                x-transition.opacity.duration.300ms>

                <!-- Navigation -->
                <nav class="flex flex-wrap justify-center gap-2 mb-6">
                    <template x-for="section in sections" :key="section.id">
                        <button @click="showSection(section.id)" :class="getSectionClass(section.id)"
                            x-text="`${section.icon} ${section.name}`">
                        </button>
                    </template>
                </nav>

                <!-- Settings Content -->
                <div class="space-y-6">

                    <!-- Device Section -->
                    <div x-show="activeSection === 'device'" class="settings-section">
                        <div class="settings-card settings-card-blue">
                            <h2 class="settings-card-header settings-card-header-blue">
                                <span class="text-3xl">⚙️</span>
                                <span>Device</span>
                            </h2>

                            <!-- Device Info -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                <div class="space-y-2">
                                    <label for="device-owner" class="form-label">Device Owner:</label>
                                    <input id="device-owner" type="text" placeholder="Enter device owner name"
                                        class="input-standard" x-model="config.device.owner">
                                    <p x-show="validation.errors['device.owner']"
                                        class="text-xs text-red-600 dark:text-red-400"
                                        x-text="validation.errors['device.owner']"></p>
                                    <p x-show="!validation.errors['device.owner'] && config.device.mdns"
                                        class="text-xs text-gray-500 dark:text-gray-400">
                                        mDNS Hostname: <span x-text="config.device.mdns"></span>
                                    </p>
                                </div>
                                <div class="space-y-2">
                                    <label for="timezone" class="form-label">Timezone:</label>
                                    <input id="timezone" type="text"
                                        placeholder="Enter IANA timezone (e.g., America/New_York)"
                                        class="input-standard" x-model="config.device.timezone">
                                    <p class="text-xs text-gray-500 dark:text-gray-400">
                                        Enter a valid IANA timezone identifier. Examples: America/New_York,
                                        Europe/London,
                                        Asia/Tokyo, Australia/Sydney
                                    </p>
                                </div>
                            </div>

                            <!-- WiFi -->
                            <div class="space-y-4 mb-8">
                                <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 border-b border-gray-200 dark:border-gray-700 pb-2">
                                    WiFi
                                </h3>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <!-- WiFi Network Selection -->
                                    <div class="space-y-2">
                                        <label class="form-label">WiFi Network (Signal Strength):</label>

                                        <!-- Network Selection Dropdown -->
                                        <select id="wifi-network-select" @change="selectNetwork($event.target.value)"
                                            :disabled="wifiScan.dropdownDisabled" :class="{
                                        'input-standard': true,
                                        'opacity-60 cursor-not-allowed': wifiScan.dropdownDisabled,
                                        'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-700': wifiScan.isScanning
                                    }" x-model="wifiScan.selectedNetwork"
                                    x-effect="
                                        if (wifiScan.selectedNetwork !== null && wifiScan.options.length > 0) {
                                            $nextTick(() => $el.value = wifiScan.selectedNetwork);
                                        }
                                    ">

                                            <template x-for="option in wifiScan.options" :key="option.value">
                                                <option :value="option.value" :disabled="option.disabled"
                                                    x-text="option.label">
                                                </option>
                                            </template>
                                        </select>

                                        <!-- Manual SSID Input (reactive display) -->
                                        <div x-show="wifiScan.showManualEntry" class="mt-2"
                                            x-transition:enter="transition ease-out duration-200"
                                            x-transition:enter-start="opacity-0 transform scale-95"
                                            x-transition:enter-end="opacity-100 transform scale-100">
                                            <label for="wifi-ssid" class="form-label text-sm">Network Name
                                                (SSID):</label>
                                            <input id="wifi-ssid" type="text" placeholder="Enter WiFi network name"
                                                class="input-standard" x-model="config.device.wifi.ssid">
                                        </div>

                                        <!-- WiFi Scan Status/Error Messages -->
                                        <div x-show="wifiScan.isScanning"
                                            class="text-xs text-blue-600 dark:text-blue-400 flex items-center">
                                            <div
                                                class="animate-spin rounded-full h-3 w-3 border-b-2 border-blue-600 mr-2">
                                            </div>
                                            Sniffing the Air…
                                        </div>
                                        <div x-show="wifiScan.error" class="text-xs text-red-600 dark:text-red-400"
                                            x-text="wifiScan.error"></div>

                                        <!-- Validation Error Display -->
                                        <p x-show="validation.errors['wifi.ssid']"
                                            class="text-xs text-red-600 dark:text-red-400"
                                            x-text="validation.errors['wifi.ssid']"></p>
                                    </div>
                                    <div class="space-y-2">
                                        <label for="wifi-password" class="form-label">WiFi Password:</label>
                                        <input type="password" id="wifi-password" class="input-standard"
                                            x-model="config.device.wifi.password">
                                    </div>
                                    <div class="space-y-2">
                                        <label for="wifi-timeout" class="form-label">Connection Timeout
                                            (seconds):</label>
                                        <input type="number" id="wifi-timeout" min="5" max="60" class="input-standard"
                                            :value="Math.floor(config.device.wifi.connect_timeout / 1000)"
                                            @input="config.device.wifi.connect_timeout = parseInt($el.value) * 1000">
                                        <p x-show="validation.errors['wifi.connect_timeout']"
                                            class="text-xs text-red-600 dark:text-red-400"
                                            x-text="validation.errors['wifi.connect_timeout']"></p>
                                        <p x-show="!validation.errors['wifi.connect_timeout']"
                                            class="text-xs text-gray-500 dark:text-gray-400">
                                            Time to wait before falling back to AP mode (5-60 seconds)
                                        </p>
                                    </div>
                                </div>

                                <!-- WiFi Warning -->
                                <div class="warning-box mt-4">
                                    <div class="flex items-start space-x-3">
                                        <span class="text-2xl">⚠️</span>
                                        <div class="flex-1">
                                            <h4 class="warning-title">WiFi Change Warning</h4>
                                            <p class="text-sm text-orange-700 dark:text-orange-400 mt-1">
                                                Changing WiFi settings will cause the device to restart and connect to
                                                the
                                                new
                                                network. If connection fails, the device will create an AP with SSID:
                                                <span class="font-mono font-bold"
                                                    x-text="config?.device?.wifi?.fallback_ap_ssid || 'Scribe-setup'"></span>
                                                and password: <span class="font-mono font-bold"
                                                    x-text="config?.device?.wifi?.fallback_ap_password || 'scribe123'"></span>
                                            </p>
                                            <button @click="printAPDetails()" :disabled="apPrintStatus === 'scribing'"
                                                class="mt-3 px-2 py-1 text-xs bg-gray-500 hover:bg-gray-600 dark:bg-gray-600 dark:hover:bg-gray-700 text-white rounded transition-colors duration-200 flex items-center gap-1 disabled:opacity-50 disabled:cursor-not-allowed">
                                                🖨️ <span x-text="apPrintButtonText"></span>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <!-- Current WiFi Status (Read-only) -->
                                <div class="status-info-box">
                                    <div class="status-info-header">
                                        <span class="text-2xl mr-2">📊</span>
                                        <span>Current WiFi Status</span>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div class="space-y-2">
                                            <div class="text-sm">
                                                <span class="font-medium text-gray-700 dark:text-gray-300">IP
                                                    Address:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.device.wifi.status?.ip_address || '-'"></span>
                                            </div>
                                            <div class="text-sm">
                                                <span class="font-medium text-gray-700 dark:text-gray-300">Signal
                                                    Strength:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.device.wifi.status?.signal_strength || '-'"></span>
                                            </div>
                                            <div class="text-sm">
                                                <span class="font-medium text-gray-700 dark:text-gray-300">MAC
                                                    Address:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.device.wifi.status?.mac_address || '-'"></span>
                                            </div>
                                        </div>
                                        <div class="space-y-2">
                                            <div class="text-sm">
                                                <span
                                                    class="font-medium text-gray-700 dark:text-gray-300">Gateway:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.device.wifi.status?.gateway || '-'"></span>
                                            </div>
                                            <div class="text-sm">
                                                <span class="font-medium text-gray-700 dark:text-gray-300">DNS:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.device.wifi.status?.dns || '-'"></span>
                                            </div>
                                            <div class="text-sm">
                                                <span class="font-medium text-gray-700 dark:text-gray-300">mDNS
                                                    Hostname:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.device?.mdns || '-'"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- GPIO Configuration -->
                            <div class="space-y-4 mb-8">
                                <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 border-b border-gray-200 dark:border-gray-700 pb-2">
                                    GPIO Configuration
                                </h3>
                                
                                <!-- Printer TX GPIO -->
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="space-y-2">
                                        <label for="printer-tx-pin" class="form-label">Printer TX GPIO:</label>
                                        <select id="printer-tx-pin" class="input-standard" 
                                                x-model="config.device.printerTxPin"
                                                x-effect="
                                                    if (!loading && config.device.printerTxPin !== null && printerGpioOptions.length > 0) {
                                                        $nextTick(() => $el.value = config.device.printerTxPin);
                                                    }
                                                ">
                                            <template x-for="gpio in printerGpioOptions" :key="gpio.pin">
                                                <option :value="gpio.pin" 
                                                        :disabled="!gpio.available"
                                                        x-text="`GPIO ${gpio.pin} - ${gpio.description}${!gpio.available ? ' (In Use)' : ''}`">
                                                </option>
                                            </template>
                                        </select>
                                        <p class="text-xs text-gray-500 dark:text-gray-400">
                                            UART communication to thermal printer
                                        </p>
                                    </div>

                                    <!-- LED Strip GPIO -->
                                    <div class="space-y-2">
                                        <label for="led-strip-pin" class="form-label">LED Strip GPIO:</label>
                                        <select id="led-strip-pin" class="input-standard" 
                                                x-model="config.leds.pin"
                                                x-effect="
                                                    if (!loading && config.leds.pin !== null && gpioOptions.length > 0) {
                                                        $nextTick(() => $el.value = config.leds.pin);
                                                    }
                                                ">
                                            <template x-for="gpio in gpioOptions" :key="gpio.pin">
                                                <option :value="gpio.pin" 
                                                        :disabled="!gpio.available"
                                                        x-text="gpio.pin === -1 ? gpio.description : `GPIO ${gpio.pin} - ${gpio.description}${!gpio.available ? ' (In Use)' : ''}`">
                                                </option>
                                            </template>
                                        </select>
                                        <p class="text-xs text-gray-500 dark:text-gray-400">
                                            Data pin for addressable LED strip
                                        </p>
                                    </div>
                                </div>

                                <!-- Button GPIO Pins -->
                                <div class="mt-6">
                                    <h4 class="text-md font-medium text-gray-700 dark:text-gray-300 mb-3">Button GPIO Pins</h4>
                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                        <template x-for="buttonNum in [1, 2, 3, 4]" :key="buttonNum">
                                            <div class="space-y-2">
                                                <label :for="`device-button${buttonNum}-gpio`" class="form-label"
                                                       x-text="`Button ${buttonNum}:`"></label>
                                                <select :id="`device-button${buttonNum}-gpio`" class="input-standard"
                                                        x-model="config.buttons[`button${buttonNum}`].gpio"
                                                        x-effect="
                                                            if (!loading && config.buttons[`button${buttonNum}`].gpio !== null && gpioOptions.length > 0) {
                                                                $nextTick(() => $el.value = config.buttons[`button${buttonNum}`].gpio);
                                                            }
                                                        ">
                                                    <template x-for="gpio in gpioOptions" :key="gpio.pin">
                                                        <option :value="gpio.pin" 
                                                                :disabled="!gpio.available"
                                                                x-text="gpio.pin === -1 ? gpio.description : `GPIO ${gpio.pin} - ${gpio.description}${!gpio.available ? ' (In Use)' : ''}`">
                                                        </option>
                                                    </template>
                                                </select>
                                            </div>
                                        </template>
                                    </div>
                                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">
                                        GPIO pins for hardware button inputs (pull-up enabled)
                                    </p>
                                </div>
                            </div>

                            <!-- WiFi -->
                            <div class="mb-8">
                                <h3
                                    class="text-lg font-semibold text-purple-800 dark:text-purple-100 mb-4 flex items-center">
                                    <span>WiFi</span>
                                </h3>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <!-- WiFi Network Selection -->
                                    <div class="space-y-2">
                                        <label class="form-label">WiFi Network (Signal Strength):</label>

                                        <!-- Network Selection Dropdown -->
                                        <select id="wifi-network-select" @change="selectNetwork($event.target.value)"
                                            :disabled="wifiScan.dropdownDisabled" :class="{
                                        'input-standard': true,
                                        'opacity-60 cursor-not-allowed': wifiScan.dropdownDisabled,
                                        'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-700': wifiScan.isScanning
                                    }" x-model="wifiScan.selectedNetwork"
                                    x-effect="
                                        if (wifiScan.selectedNetwork !== null && wifiScan.options.length > 0) {
                                            $nextTick(() => $el.value = wifiScan.selectedNetwork);
                                        }
                                    ">

                                            <template x-for="option in wifiScan.options" :key="option.value">
                                                <option :value="option.value" :disabled="option.disabled"
                                                    x-text="option.label">
                                                </option>
                                            </template>
                                        </select>

                                        <!-- Manual SSID Input (reactive display) -->
                                        <div x-show="wifiScan.showManualEntry" class="mt-2"
                                            x-transition:enter="transition ease-out duration-200"
                                            x-transition:enter-start="opacity-0 transform scale-95"
                                            x-transition:enter-end="opacity-100 transform scale-100">
                                            <label for="wifi-ssid" class="form-label text-sm">Network Name
                                                (SSID):</label>
                                            <input id="wifi-ssid" type="text" placeholder="Enter WiFi network name"
                                                class="input-standard" x-model="config.device.wifi.ssid">
                                        </div>

                                        <!-- WiFi Scan Status/Error Messages -->
                                        <div x-show="wifiScan.isScanning"
                                            class="text-xs text-blue-600 dark:text-blue-400 flex items-center">
                                            <div
                                                class="animate-spin rounded-full h-3 w-3 border-b-2 border-blue-600 mr-2">
                                            </div>
                                            Sniffing the Air…
                                        </div>
                                        <div x-show="wifiScan.error" class="text-xs text-red-600 dark:text-red-400"
                                            x-text="wifiScan.error"></div>

                                        <!-- Validation Error Display -->
                                        <p x-show="validation.errors['wifi.ssid']"
                                            class="text-xs text-red-600 dark:text-red-400"
                                            x-text="validation.errors['wifi.ssid']"></p>
                                    </div>
                                    <div class="space-y-2">
                                        <label for="wifi-password" class="form-label">WiFi Password:</label>
                                        <input type="password" id="wifi-password" class="input-standard"
                                            x-model="config.device.wifi.password">
                                    </div>
                                    <div class="space-y-2">
                                        <label for="wifi-timeout" class="form-label">Connection Timeout
                                            (seconds):</label>
                                        <input type="number" id="wifi-timeout" min="5" max="60" class="input-standard"
                                            :value="Math.floor(config.device.wifi.connect_timeout / 1000)"
                                            @input="config.device.wifi.connect_timeout = parseInt($el.value) * 1000">
                                        <p x-show="validation.errors['wifi.connect_timeout']"
                                            class="text-xs text-red-600 dark:text-red-400"
                                            x-text="validation.errors['wifi.connect_timeout']"></p>
                                        <p x-show="!validation.errors['wifi.connect_timeout']"
                                            class="text-xs text-gray-500 dark:text-gray-400">
                                            Time to wait before falling back to AP mode (5-60 seconds)
                                        </p>
                                    </div>
                                </div>

                                <!-- WiFi Warning -->
                                <div class="warning-box mt-4">
                                    <div class="flex items-start space-x-3">
                                        <span class="text-2xl">⚠️</span>
                                        <div class="flex-1">
                                            <h4 class="warning-title">WiFi Change Warning</h4>
                                            <p class="text-sm text-orange-700 dark:text-orange-400 mt-1">
                                                Changing WiFi settings will cause the device to restart and connect to
                                                the
                                                new
                                                network. If connection fails, the device will create an AP with SSID:
                                                <span class="font-mono font-bold"
                                                    x-text="config?.device?.wifi?.fallback_ap_ssid || 'Scribe-setup'"></span>
                                                and password: <span class="font-mono font-bold"
                                                    x-text="config?.device?.wifi?.fallback_ap_password || 'scribe123'"></span>
                                            </p>
                                            <button @click="printAPDetails()" :disabled="apPrintStatus === 'scribing'"
                                                class="mt-3 px-2 py-1 text-xs bg-gray-500 hover:bg-gray-600 dark:bg-gray-600 dark:hover:bg-gray-700 text-white rounded transition-colors duration-200 flex items-center gap-1 disabled:opacity-50 disabled:cursor-not-allowed">
                                                🖨️ <span x-text="apPrintButtonText"></span>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <!-- Current WiFi Status (Read-only) -->
                                <div class="status-info-box">
                                    <div class="status-info-header">
                                        <span class="text-2xl mr-2">📊</span>
                                        <span>Current WiFi Status</span>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div class="space-y-2">
                                            <div class="text-sm">
                                                <span class="font-medium text-gray-700 dark:text-gray-300">IP
                                                    Address:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.device.wifi.status?.ip_address || '-'"></span>
                                            </div>
                                            <div class="text-sm">
                                                <span class="font-medium text-gray-700 dark:text-gray-300">Signal
                                                    Strength:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.device.wifi.status?.signal_strength || '-'"></span>
                                            </div>
                                            <div class="text-sm">
                                                <span class="font-medium text-gray-700 dark:text-gray-300">MAC
                                                    Address:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.device.wifi.status?.mac_address || '-'"></span>
                                            </div>
                                        </div>
                                        <div class="space-y-2">
                                            <div class="text-sm">
                                                <span
                                                    class="font-medium text-gray-700 dark:text-gray-300">Gateway:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.device.wifi.status?.gateway || '-'"></span>
                                            </div>
                                            <div class="text-sm">
                                                <span class="font-medium text-gray-700 dark:text-gray-300">DNS:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.device.wifi.status?.dns || '-'"></span>
                                            </div>
                                            <div class="text-sm">
                                                <span class="font-medium text-gray-700 dark:text-gray-300">mDNS
                                                    Hostname:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.device?.mdns || '-'"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- MQTT Section -->
                    <div x-show="activeSection === 'mqtt'" class="settings-section">
                        <div class="settings-card settings-card-yellow">
                            <h2 class="settings-card-header settings-card-header-yellow">
                                <span class="text-3xl">📡</span>
                                <span>MQTT</span>
                            </h2>

                            <!-- MQTT Server - Full width row -->
                            <div class="space-y-2">
                                <label for="mqtt-server" class="form-label">MQTT Server:</label>
                                <input id="mqtt-server" type="text" placeholder="Enter MQTT broker address"
                                    class="input-standard" x-model="config.mqtt.server">
                            </div>

                            <!-- Username, Password, Port - Three columns on desktop -->
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div class="space-y-2">
                                    <label for="mqtt-username" class="form-label">MQTT Username:</label>
                                    <input id="mqtt-username" type="text" placeholder="Optional MQTT username"
                                        class="input-standard" x-model="config.mqtt.username">
                                </div>
                                <div class="space-y-2">
                                    <label for="mqtt-password" class="form-label">MQTT Password:</label>
                                    <input type="password" id="mqtt-password" placeholder="Optional MQTT password"

                                                    Low:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.buttons?.active_low ? 'Yes' : (config.buttons?.active_low === false ? 'No' : '-')"></span>
                                            </div>
                                        </div>
                                        <div class="space-y-2">
                                            <div>
                                                <span class="font-medium text-gray-700 dark:text-gray-300">Min
                                                    Interval:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="(config.buttons?.min_interval || '-') + (config.buttons?.min_interval ? ' ms' : '')"></span>
                                            </div>
                                            <div>
                                                <span class="font-medium text-gray-700 dark:text-gray-300">Max Per
                                                    Minute:</span>
                                                <span class="text-gray-800 dark:text-gray-200"
                                                    x-text="config.buttons?.max_per_minute || '-'"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- LEDs Section -->
                    <div x-show="activeSection === 'leds'" class="settings-section">
                        <div
                            class="bg-purple-50 dark:bg-purple-900/20 border border-purple-200 dark:border-purple-700 shadow-2xl rounded-3xl p-8">
                            <h2
                                class="text-2xl font-bold text-purple-800 dark:text-purple-100 mb-6 flex items-center space-x-2">
                                <span class="text-3xl">🌈</span>
                                <span>LEDs</span>
                            </h2>

                            <div class="space-y-6">
                                <!-- Hardware Configuration -->
                                <div class="border border-gray-200 dark:border-gray-600 rounded-xl p-4">
                                    <h3 class="text-lg font-medium text-gray-800 dark:text-gray-100 mb-4">Hardware
                                        Configuration
                                    </h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div class="space-y-2">
                                            <div>
                                                <span class="text-sm text-gray-600 dark:text-gray-400">GPIO Pin: </span>
                                                <span class="font-mono font-medium text-gray-800 dark:text-gray-200"
                                                      x-text="`GPIO ${config.leds.pin || 'Unknown'}`"></span>
                                                <span class="text-xs text-gray-500 dark:text-gray-400"> (Configure in Settings > Device)</span>
                                            </div>
                                        </div>
                                        <div class="space-y-2">
                                            <label for="led-count"
                                                class="block text-sm font-medium text-gray-700 dark:text-gray-300">LED
                                                Count</label>
                                            <input type="number" id="led-count" min="1" max="300" class="input-standard"
                                                x-model="config.leds.count" placeholder="60">
                                            <p class="text-xs text-gray-500 dark:text-gray-400">Number of LEDs in your
                                                strip
                                                (typically 30, 60, or 144 per meter)</p>
                                        </div>
                                    </div>
                                </div>

                                <!-- System Settings -->
                                <div class="border border-gray-200 dark:border-gray-600 rounded-xl p-4">
                                    <h3 class="text-lg font-medium text-gray-800 dark:text-gray-100 mb-4">System
                                        Settings
                                    </h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div class="space-y-2">
                                            <label for="led-brightness"
                                                class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                                Brightness (<span x-text="config.leds.brightness"></span>/255)
                                            </label>
                                            <input type="range" id="led-brightness" min="10" max="255" step="5"
                                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                                x-model="config.leds.brightness">
                                            <p class="text-xs text-gray-500 dark:text-gray-400">Lower values save power
                                                and reduce heat</p>
                                        </div>
                                        <div class="space-y-2">
                                            <label for="led-refresh-rate"
                                                class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                                Refresh Rate (<span x-text="config.leds.refreshRate"></span> Hz)
                                            </label>
                                            <input type="range" id="led-refresh-rate" min="10" max="120" step="5"
                                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                                x-model="config.leds.refreshRate">
                                            <p class="text-xs text-gray-500 dark:text-gray-400">Higher values make
                                                animations smoother but use more CPU</p>
                                        </div>
                                    </div>
                                </div>

                                <!-- LED Effect Playground -->
                                <div class="border border-gray-200 dark:border-gray-600 rounded-xl p-4">
                                    <h3 class="text-lg font-medium text-gray-800 dark:text-gray-100 mb-4">Effect
                                        Playground
                                    </h3>
                                    <!-- Effect Selection -->
                                    <div class="space-y-4">
                                        <div class="space-y-2">
                                            <label for="led-effect-selector"
                                                class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                                Effect
                                            </label>
                                            <select id="led-effect-selector" class="input-standard"
                                                x-model="selectedEffect" @change="initEffectParams()">
                                                <option value="chase_single">Single Colour Chase</option>
                                                <option value="rainbow">Rainbow Wave</option>
                                                <option value="twinkle">Twinkle</option>
                                                <option value="chase_multi">Multicolour Chase</option>
                                                <option value="pulse">Pulse</option>
                                                <option value="matrix">Matrix</option>
                                            </select>
                                        </div>

                                        <!-- Effect Description -->
                                        <div class="p-3 bg-gray-50 dark:bg-gray-700 rounded-lg mb-4">
                                            <p class="text-sm text-gray-600 dark:text-gray-300"
                                                x-text="getEffectDescription()">
                                            </p>
                                        </div>

                                        <!-- Generic Parameters -->
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                            <!-- Speed -->
                                            <div class="space-y-2">
                                                <label for="led-speed"
                                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                                    Speed (1-100)
                                                </label>
                                                <input type="range" id="led-speed" min="1" max="100" step="1"
                                                    class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                                    x-model="effectParams.speed">
                                                <div class="text-xs text-gray-500 text-center"
                                                    x-text="effectParams.speed">
                                                </div>
                                            </div>

                                            <!-- Intensity -->
                                            <div class="space-y-2">
                                                <label for="led-intensity"
                                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                                    Intensity (1-100)
                                                </label>
                                                <input type="range" id="led-intensity" min="1" max="100" step="1"
                                                    class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                                    x-model="effectParams.intensity">
                                                <div class="text-xs text-gray-500 text-center"
                                                    x-text="effectParams.intensity">
                                                </div>
                                            </div>

                                            <!-- Number of Cycles -->
                                            <div class="space-y-2">
                                                <label for="led-cycles"
                                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                                    Number of Cycles (1-10)
                                                </label>
                                                <input type="range" id="led-cycles" min="1" max="10" step="1"
                                                    class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                                    x-model.number="effectParams.cycles">
                                                <div class="text-xs text-gray-500 text-center"
                                                    x-text="effectParams.cycles">
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Effect-Specific Parameters -->
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                            <!-- Custom Slider 1 -->
                                            <div class="space-y-2" x-show="getCustomSlider1Label()">
                                                <label for="led-custom1"
                                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300"
                                                    x-text="getCustomSlider1Label()">
                                                </label>
                                                <input type="range" id="led-custom1" :min="getCustomSlider1Range().min"
                                                    :max="getCustomSlider1Range().max"
                                                    :step="getCustomSlider1Range().step"
                                                    class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                                    x-model="effectParams.custom1">
                                                <div class="text-xs text-gray-500 text-center"
                                                    x-text="effectParams.custom1">
                                                </div>
                                            </div>

                                            <!-- Custom Slider 2 -->
                                            <div class="space-y-2" x-show="getCustomSlider2Label()">
                                                <label for="led-custom2"
                                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300"
                                                    x-text="getCustomSlider2Label()">
                                                </label>
                                                <input type="range" id="led-custom2" :min="getCustomSlider2Range().min"
                                                    :max="getCustomSlider2Range().max"
                                                    :step="getCustomSlider2Range().step"
                                                    class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                                    x-model="effectParams.custom2">
                                                <div class="text-xs text-gray-500 text-center"
                                                    x-text="effectParams.custom2">
                                                </div>
                                            </div>

                                            <!-- Custom Slider 3 -->
                                            <div class="space-y-2" x-show="getCustomSlider3Label()">
                                                <label for="led-custom3"
                                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300"
                                                    x-text="getCustomSlider3Label()">
                                                </label>
                                                <input type="range" id="led-custom3" :min="getCustomSlider3Range().min"
                                                    :max="getCustomSlider3Range().max"
                                                    :step="getCustomSlider3Range().step"
                                                    class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                                    x-model="effectParams.custom3">
                                                <div class="text-xs text-gray-500 text-center"
                                                    x-text="effectParams.custom3">
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Color Parameters -->
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <!-- Color 1 -->
                                            <div class="space-y-3">
                                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                                    Color
                                                </label>
                                                <!-- Color Swatches + Custom -->
                                                <div class="grid grid-cols-7 gap-2">
                                                    <!-- 6 Preset Colors -->
                                                    <template x-for="(preset, index) in colorPresets" :key="index">
                                                        <div class="relative">
                                                            <div :style="`background-color: ${preset}`"
                                                                 @click="selectColor('color1', preset, 'preset')"
                                                                 class="w-10 h-10 rounded-lg cursor-pointer border-2 transition-all hover:scale-105"
                                                                 :class="{
                                                                     'border-gray-600 dark:border-gray-300 shadow-lg': effectParams.color1 === preset,
                                                                     'border-gray-300 dark:border-gray-600': effectParams.color1 !== preset
                                                                 }">
                                                            </div>
                                                            <!-- Selected indicator -->
                                                            <div x-show="effectParams.color1 === preset" 
                                                                 class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border border-white"></div>
                                                        </div>
                                                    </template>
                                                    
                                                    <!-- Custom Color -->
                                                    <div class="relative">
                                                        <input type="color" 
                                                               x-model="effectParams.color1"
                                                               @change="selectColor('color1', $el.value, 'custom')"
                                                               class="w-10 h-10 rounded-lg cursor-pointer border-2 transition-all hover:scale-105"
                                                               :class="{
                                                                   'border-gray-600 dark:border-gray-300 shadow-lg': color1Type === 'custom',
                                                                   'border-gray-300 dark:border-gray-600': color1Type !== 'custom'
                                                               }"
                                                               title="Custom Color">
                                                        <!-- Selected indicator for custom -->
                                                        <div x-show="color1Type === 'custom'" 
                                                             class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border border-white pointer-events-none"></div>
                                                    </div>
                                                </div>
                                            </div>

                                            <!-- Additional Colors for Multicolour Chase -->
                                            <div class="space-y-3" x-show="selectedEffect === 'chase_multi'">
                                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                                    Color 2
                                                </label>
                                                <div class="grid grid-cols-7 gap-2">
                                                    <template x-for="(preset, index) in colorPresets" :key="index">
                                                        <div class="relative">
                                                            <div :style="`background-color: ${preset}`"
                                                                 @click="selectColor('color2', preset, 'preset')"
                                                                 class="w-10 h-10 rounded-lg cursor-pointer border-2 transition-all hover:scale-105"
                                                                 :class="{
                                                                     'border-gray-600 dark:border-gray-300 shadow-lg': effectParams.color2 === preset,
                                                                     'border-gray-300 dark:border-gray-600': effectParams.color2 !== preset
                                                                 }">
                                                            </div>
                                                            <div x-show="effectParams.color2 === preset" 
                                                                 class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border border-white"></div>
                                                        </div>
                                                    </template>
                                                    
                                                    <div class="relative">
                                                        <input type="color" 
                                                               x-model="effectParams.color2"
                                                               @change="selectColor('color2', $el.value, 'custom')"
                                                               class="w-10 h-10 rounded-lg cursor-pointer border-2 transition-all hover:scale-105"
                                                               :class="{
                                                                   'border-gray-600 dark:border-gray-300 shadow-lg': color2Type === 'custom',
                                                                   'border-gray-300 dark:border-gray-600': color2Type !== 'custom'
                                                               }"
                                                               title="Custom Color">
                                                        <div x-show="color2Type === 'custom'" 
                                                             class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border border-white pointer-events-none"></div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="space-y-3" x-show="selectedEffect === 'chase_multi'">
                                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                                    Color 3
                                                </label>
                                                <div class="grid grid-cols-7 gap-2">
                                                    <template x-for="(preset, index) in colorPresets" :key="index">
                                                        <div class="relative">
                                                            <div :style="`background-color: ${preset}`"
                                                                 @click="selectColor('color3', preset, 'preset')"
                                                                 class="w-10 h-10 rounded-lg cursor-pointer border-2 transition-all hover:scale-105"
                                                                 :class="{
                                                                     'border-gray-600 dark:border-gray-300 shadow-lg': effectParams.color3 === preset,
                                                                     'border-gray-300 dark:border-gray-600': effectParams.color3 !== preset
                                                                 }">
                                                            </div>
                                                            <div x-show="effectParams.color3 === preset" 
                                                                 class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border border-white"></div>
                                                        </div>
                                                    </template>
                                                    
                                                    <div class="relative">
                                                        <input type="color" 
                                                               x-model="effectParams.color3"
                                                               @change="selectColor('color3', $el.value, 'custom')"
                                                               class="w-10 h-10 rounded-lg cursor-pointer border-2 transition-all hover:scale-105"
                                                               :class="{
                                                                   'border-gray-600 dark:border-gray-300 shadow-lg': color3Type === 'custom',
                                                                   'border-gray-300 dark:border-gray-600': color3Type !== 'custom'
                                                               }"
                                                               title="Custom Color">
                                                        <div x-show="color3Type === 'custom'" 
                                                             class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border border-white pointer-events-none"></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Control Buttons -->
                                        <div class="flex gap-3 pt-4">
                                            <button type="button" @click="testLedEffect(selectedEffect)"
                                                class="py-2 px-4 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-medium transition-colors text-sm">
                                                🎨 Test Effect
                                            </button>
                                            <button type="button" @click="turnOffLeds()"
                                                class="py-2 px-4 bg-gray-500 hover:bg-gray-600 text-white rounded-lg font-medium transition-colors text-sm">
                                                💡 Turn Off LEDs
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Form Actions (shown when not loading and no error) -->
                <form @submit.prevent="saveConfiguration()">
                    <!-- Action Buttons -->
                    <div class="flex justify-center gap-4 pt-6">
                        <button type="button" @click="cancelConfiguration()"
                            class="px-6 py-3 bg-gray-500 hover:bg-gray-600 text-white font-medium rounded-xl transition-colors duration-200">
                            Cancel
                        </button>
                        <button type="submit" :disabled="saving || !canSaveForm" class="btn-primary btn-primary-large"
                            :class="{ 'opacity-50 cursor-not-allowed': saving || !canSaveForm }"
                            :title="!canSaveForm ? 'Please fill in all required fields to save' : ''">
                            <span x-show="!saving">💾 Save Settings</span>
                            <span x-show="saving">
                                <div class="flex items-center space-x-2">
                                    <div
                                        class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin">
                                    </div>
                                    <span>Saving...</span>
                                </div>
                            </span>
                        </button>
                    </div>
                </form>

            </div> <!-- End main content wrapper -->
        </template>
    </main>

    <script src="/js/vendor.min.js" defer></script>
</body>

</html>
