<!DOCTYPE html>
<html lang="en" class="app-root">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Settings - Scribe Evolution</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/css/settings.min.css">
    <script src="/js/app-common.min.js"></script>
    <script src="/js/page-settings.min.js"></script>
    <script src="/js/alpine.min.js" defer></script>
</head>

<body class="page-body" x-data="window.settingsStoreInstance || {}">
    <main class="page-main">
        <!-- Header with title and back button -->
        <header class="page-header">
            <!-- Back button (not shown in AP mode) -->
            <div class="header-spacer">
                <button x-show="!config?.device?.wifi?.status?.ap_mode" @click="window.location.href = '/'" class="back-button">
                    <svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                    <span class="text-xs sm:text-sm font-medium">Back</span>
                </button>
            </div>

            <!-- Centered title with settings icon -->
            <div class="header-center">
                <h1 class="page-title">
                    <svg class="w-7 h-7 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"></path>
                    </svg>
                    <span>Settings</span>
                </h1>
            </div>

            <!-- Right spacer -->
            <div class="header-spacer"></div>
        </header>


        <!-- Error State -->
        <div x-show="error" class="settings-card bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800"
            x-transition>
            <div class="text-center">
                <svg class="w-10 h-10 mb-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"></path>
                </svg>
                <h3 class="text-lg font-semibold text-red-800 dark:text-red-200 mb-2">Configuration Loading Error</h3>
                <p class="text-red-600 dark:text-red-300 mb-4" x-text="error"></p>
                <p class="text-sm text-red-500 dark:text-red-400">Please check the system and try refreshing the page.
                </p>
                <button @click="window.location.reload()" class="mt-4 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors">
                    Retry
                </button>
            </div>
        </div>

        <!-- Main Content - use x-if to prevent evaluation when loading -->
        <template x-if="!loading && !error">
            <div x-data="{ 
                ready: false, 
                init() {
                    this.$nextTick(() => {
                        // Use requestAnimationFrame for smooth animation timing
                        requestAnimationFrame(() => {
                            this.ready = true;
                        });
                    });
                }
            }" x-show="ready" x-transition:enter="transition ease-out duration-600 transform" 
                x-transition:enter-start="translate-y-4 opacity-0" 
                x-transition:enter-end="translate-y-0 opacity-100">

                <!-- Navigation -->
                <nav class="flex flex-wrap justify-center gap-2 mb-6">
                    <template x-for="section in sections" :key="section.id">
                        <button @click="showSection(section.id)" :class="getSectionClass(section.id)">
                            <span x-html="window.renderTabIcon ? window.renderTabIcon(section.icon) : section.icon"></span>
                            <span x-text="section.name"></span>
                        </button>
                    </template>
                </nav>

                <!-- Settings Content -->
                <form @submit.prevent="saveConfiguration" class="space-y-6">
                    <!-- Device Section -->
                    <div x-show="activeSection === 'device'" x-transition.opacity.duration.300ms x-html="$store.partials.load('device')"></div>

                    <!-- WiFi Section -->
                    <div x-show="activeSection === 'wifi'" x-transition.opacity.duration.300ms x-html="$store.partials.load('wifi')"></div>

                    <!-- Memos Section -->
                    <div x-show="activeSection === 'memos'" x-transition.opacity.duration.300ms x-html="$store.partials.load('memos')"></div>

                    <!-- MQTT Section -->
                    <div x-show="activeSection === 'mqtt'" x-transition.opacity.duration.300ms x-html="$store.partials.load('mqtt')"></div>

                    <!-- Unbidden Ink Section -->
                    <div x-show="activeSection === 'unbidden'" x-transition.opacity.duration.300ms x-html="$store.partials.load('unbidden')"></div>

                    <!-- Buttons Section -->
                    <div x-show="activeSection === 'buttons'" x-transition.opacity.duration.300ms x-html="$store.partials.load('buttons')"></div>

                    <!-- LEDs Section -->
                    <div x-show="activeSection === 'leds'" x-transition.opacity.duration.300ms x-html="$store.partials.load('leds')"></div>

                    <!-- Action Buttons -->
                    <div class="flex justify-center gap-4 pt-6">
                        <button type="button" @click="cancelConfiguration"
                            class="px-6 py-3 bg-gray-500 hover:bg-gray-600 text-white font-medium rounded-xl transition-colors duration-200">
                            Cancel
                        </button>
                        <button type="submit" :disabled="saving || !canSaveForm" class="btn-primary"
                            :class="{ 'opacity-50 cursor-not-allowed': saving || !canSaveForm }"
                            :title="!canSaveForm ? (config.mqtt?.enabled && !mqttTestPassed ? 'Please test MQTT connection before saving' : 'Please fill in all required fields to save') : ''">
                            <span x-show="!saving" class="flex items-center">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                                </svg>
                                Save Settings
                            </span>
                            <span x-show="saving">
                                <div class="flex items-center space-x-2">
                                    <div
                                        class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin">
                                    </div>
                                    <span>Saving...</span>
                                </div>
                            </span>
                        </button>
                    </div>
                </form>
            </div> <!-- End main content wrapper -->
        </template>
    </main>
</body>
</html>
