<!DOCTYPE html>
<html lang="en" class="app-root">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Settings - Scribe Evolution</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/css/settings.min.css">
    <script src="/js/page-settings.min.js"></script>
    <script src="/js/vendor.min.js" defer></script>
    <script src="/js/app-common.min.js" defer></script>
</head>

<body class="page-body" x-data="initializeSettingsStore()" x-init="init()">
    <main class="page-main">
        <!-- Header with title and back button -->
        <header class="page-header">
            <!-- Back button -->
            <div class="header-spacer">
                <button @click="window.location.href = '/'" class="back-button">
                    <svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                    <span class="text-xs sm:text-sm font-medium">Back</span>
                </button>
            </div>

            <!-- Centered title with settings icon -->
            <div class="header-center">
                <h1 class="page-title">
                    <span class="text-4xl sm:text-5xl">⚙️</span>
                    <span>Settings</span>
                </h1>
            </div>

            <!-- Right spacer -->
            <div class="header-spacer"></div>
        </header>

        <!-- Error State -->
        <div x-show="error" class="settings-card bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800"
            x-transition>
            <div class="text-center">
                <span class="text-4xl mb-4 block">⚠️</span>
                <h3 class="text-lg font-semibold text-red-800 dark:text-red-200 mb-2">Configuration Loading Error</h3>
                <p class="text-red-600 dark:text-red-300 mb-4" x-text="error"></p>
                <p class="text-sm text-red-500 dark:text-red-400">Please check the system and try refreshing the page.
                </p>
            </div>
        </div>

        <!-- Main Content - use x-if to prevent evaluation when loading -->
        <template x-if="!loading && !error">
            <div x-data="{ show: false }" x-init="$nextTick(() => show = true)" x-show="show"
                x-transition.opacity.duration.300ms>

                <!-- Navigation -->
                <nav class="flex flex-wrap justify-center gap-2 mb-6">
                    <template x-for="section in sections" :key="section.id">
                        <button @click="showSection(section.id)" :class="getSectionClass(section.id)"
                            x-text="`${section.icon} ${section.name}`">
                        </button>
                    </template>
                </nav>

                <!-- Settings Content -->
                <div class="space-y-6">

                    <!-- Device Section -->
                    <div x-html="$store.partials.load('device')" x-show="activeSection === 'device'"></div>

                    <!-- MQTT Section -->
                    <div x-html="$store.partials.load('mqtt')" x-show="activeSection === 'mqtt'"></div>

                    <!-- Unbidden Ink Section -->
                    <div x-html="$store.partials.load('unbidden')" x-show="activeSection === 'unbidden'"></div>

                    <!-- Memos Section -->
                    <div x-html="$store.partials.load('memos')" x-show="activeSection === 'memos'"></div>

                    <!-- Buttons Section -->
                    <div x-html="$store.partials.load('buttons')" x-show="activeSection === 'buttons'"></div>

                    <!-- LEDs Section -->
                    <div x-html="$store.partials.load('leds')" x-show="activeSection === 'leds'"></div>
                </div>

                <!-- Form Actions (shown when not loading and no error) -->
                <form @submit.prevent="saveConfiguration()">
                    <!-- Action Buttons -->
                    <div class="flex justify-center gap-4 pt-6">
                        <button type="button" @click="cancelConfiguration()"
                            class="px-6 py-3 bg-gray-500 hover:bg-gray-600 text-white font-medium rounded-xl transition-colors duration-200">
                            Cancel
                        </button>
                        <button type="submit" :disabled="saving || !canSaveForm" class="btn-primary btn-primary-large"
                            :class="{ 'opacity-50 cursor-not-allowed': saving || !canSaveForm }"
                            :title="!canSaveForm ? 'Please fill in all required fields to save' : ''">
                            <span x-show="!saving">💾 Save Settings</span>
                            <span x-show="saving">
                                <div class="flex items-center space-x-2">
                                    <div
                                        class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin">
                                    </div>
                                    <span>Saving...</span>
                                </div>
                            </span>
                        </button>
                    </div>
                </form>
            </div> <!-- End main content wrapper -->
        </template>
    </main>
    <script src="/js/vendor.min.js" defer></script>
    <script>
        // Register all Alpine component functions upfront
        document.addEventListener('alpine:init', () => {
            // Register all partial component functions globally

            window.mqttPartial = function() {
                return {
                    get config() { return Alpine.store('settings').config; }
                }
            };

            window.memosPartial = function() {
                return {
                    get config() { return Alpine.store('settings').config; },
                    getMemoCharacterText(memoNum) {
                        const memo = this.config.memos[`memo${memoNum}`] || '';
                        const length = memo.length;
                        const maxLength = 500;
                        return `${length}/${maxLength} characters`;
                    },
                    getMemoCharacterClass(memoNum) {
                        const memo = this.config.memos[`memo${memoNum}`] || '';
                        const length = memo.length;
                        const maxLength = 500;
                        
                        if (length > maxLength) {
                            return 'text-red-500 dark:text-red-400';
                        } else if (length > maxLength * 0.9) {
                            return 'text-orange-500 dark:text-orange-400';
                        } else {
                            return 'text-gray-500 dark:text-gray-400';
                        }
                    }
                }
            };

            window.buttonsPartial = function() {
                return {
                    get config() { return Alpine.store('settings').config; }
                }
            };


            window.ledsPartial = function() {
                return {
                    selectedEffect: 'chase_single',
                    effectParams: {
                        speed: 50,
                        intensity: 75,
                        cycles: 3,
                        custom1: 50,
                        custom2: 50,
                        custom3: 50,
                        colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff']
                    },
                    testingEffect: false,
                    
                    get config() { return Alpine.store('settings').config; },
                    
                    initEffectParams() {
                        this.effectParams = {
                            speed: 50, intensity: 75, cycles: 3,
                            custom1: 50, custom2: 50, custom3: 50,
                            colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff']
                        };
                    },
                    
                    getEffectDescription() {
                        const descriptions = {
                            chase_single: 'A single color LED chases around the strip',
                            rainbow: 'A rainbow wave flows across the strip',
                            twinkle: 'Random LEDs twinkle like stars',
                            chase_multi: 'Multiple colors chase each other around the strip',
                            pulse: 'The entire strip pulses with color',
                            matrix: 'Random green falling dots like the Matrix'
                        };
                        return descriptions[this.selectedEffect] || 'Select an effect to see description';
                    },
                    
                    getCustomSlider1Label() {
                        const labels = { chase_single: 'Chase Length', rainbow: 'Wave Length', twinkle: 'Sparkle Density', chase_multi: 'Gap Size', pulse: 'Fade Speed', matrix: 'Drop Rate' };
                        return labels[this.selectedEffect] || '';
                    },
                    
                    getCustomSlider2Label() {
                        const labels = { rainbow: 'Shift Speed', twinkle: 'Fade Time', chase_multi: 'Color Count', pulse: 'Peak Hold', matrix: 'Trail Length' };
                        return labels[this.selectedEffect] || '';
                    },
                    
                    getCustomSlider3Label() {
                        const labels = { twinkle: 'Random Factor', matrix: 'Green Variation' };
                        return labels[this.selectedEffect] || '';
                    },
                    
                    getCustomSlider1Range() {
                        const ranges = { chase_single: { min: 1, max: 20, step: 1 }, rainbow: { min: 5, max: 50, step: 1 }, twinkle: { min: 1, max: 100, step: 1 }, chase_multi: { min: 1, max: 10, step: 1 }, pulse: { min: 1, max: 100, step: 1 }, matrix: { min: 1, max: 100, step: 1 } };
                        return ranges[this.selectedEffect] || { min: 1, max: 100, step: 1 };
                    },
                    
                    getCustomSlider2Range() {
                        const ranges = { rainbow: { min: 1, max: 50, step: 1 }, twinkle: { min: 10, max: 1000, step: 10 }, chase_multi: { min: 2, max: 6, step: 1 }, pulse: { min: 0, max: 100, step: 1 }, matrix: { min: 5, max: 50, step: 1 } };
                        return ranges[this.selectedEffect] || { min: 1, max: 100, step: 1 };
                    },
                    
                    getCustomSlider3Range() {
                        const ranges = { twinkle: { min: 0, max: 100, step: 1 }, matrix: { min: 0, max: 100, step: 1 } };
                        return ranges[this.selectedEffect] || { min: 1, max: 100, step: 1 };
                    },
                    
                    showColorControls() {
                        return ['chase_single', 'chase_multi', 'pulse'].includes(this.selectedEffect);
                    },
                    
                    getColorNames() {
                        const names = { chase_single: ['Primary'], chase_multi: ['Color 1', 'Color 2', 'Color 3', 'Color 4'], pulse: ['Primary', 'Secondary'] };
                        return names[this.selectedEffect] || [];
                    },
                    
                    async testEffect() {
                        this.testingEffect = true;
                        try {
                            const payload = {
                                effect: this.selectedEffect,
                                speed: parseInt(this.effectParams.speed),
                                intensity: parseInt(this.effectParams.intensity),
                                cycles: parseInt(this.effectParams.cycles),
                                custom1: parseInt(this.effectParams.custom1),
                                custom2: parseInt(this.effectParams.custom2),
                                custom3: parseInt(this.effectParams.custom3),
                                colors: this.effectParams.colors
                            };
                            const response = await fetch('/api/led-effect', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        } catch (error) {
                            console.error('Failed to test LED effect:', error);
                        } finally {
                            this.testingEffect = false;
                        }
                    },
                    
                    async stopEffect() {
                        try {
                            const response = await fetch('/api/leds-off', { method: 'POST' });
                            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        } catch (error) {
                            console.error('Failed to stop LED effect:', error);
                        }
                    }
                }
            };

            // Alpine.js store for loading partials (clean version)
            Alpine.store('partials', {
                cache: {},
                loading: {},
                load(name) {
                    if (this.cache[name]) return this.cache[name];
                    if (this.loading[name]) return '<div class="p-4 text-center text-gray-500">Loading...</div>';
                    
                    this.loading[name] = true;
                    fetch(`/html/partials/settings/${name}.html`)
                        .then(response => {
                            if (!response.ok) throw new Error(`Failed to load partial: ${name}`);
                            return response.text();
                        })
                        .then(html => {
                            this.loading[name] = false;
                            this.cache[name] = html;
                            Alpine.store('partials', { ...this });
                        })
                        .catch(error => {
                            console.error(`Error loading partial ${name}:`, error);
                            this.cache[name] = `<div class="p-4 bg-red-50 border border-red-200 rounded-lg"><p class="text-red-600">Failed to load ${name} section</p></div>`;
                            this.loading[name] = false;
                            Alpine.store('partials', { ...this });
                        });
                    
                    return '<div class="p-4 text-center text-gray-500">Loading...</div>';
                }
            });
        });
    </script>
</body>
</html>
