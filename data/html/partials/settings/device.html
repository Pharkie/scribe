<div x-data="{}" x-show="$store.settings && !$store.settings.loading" x-transition.opacity.duration.300ms class="settings-section">
    <div class="settings-card settings-card-blue">
        <h2 class="settings-card-header settings-card-header-blue">
<span x-html="window.renderSectionIcon ? window.renderSectionIcon('cpuChip') : '🖥️'"></span>
            <span>Device</span>
        </h2>

        <!-- Device Info -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="space-y-2">
                <label for="device-owner" class="form-label">Device Owner:</label>
                <input id="device-owner" type="text" placeholder="Enter device owner name"
                    class="input-standard" x-model="$store.settings.config.device.owner">
                <p x-show="$store.settings.validation.errors['device.owner']"
                    class="text-xs text-red-600 dark:text-red-400"
                    x-text="$store.settings.validation.errors['device.owner']"></p>
            </div>
            <div class="space-y-2">
                <label for="timezone" class="form-label">Timezone:</label>
                <input id="timezone" type="text"
                    placeholder="Enter IANA timezone (e.g., America/New_York)"
                    class="input-standard" x-model="$store.settings.config.device.timezone">
                <p class="text-xs text-gray-500 dark:text-gray-400">
                    Enter a valid IANA timezone identifier. Examples: America/New_York,
                    Europe/London,
                    Asia/Tokyo, Australia/Sydney
                </p>
            </div>
        </div>


        <!-- GPIO Configuration -->
        <div class="space-y-4 mb-8">
            <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 border-b border-gray-200 dark:border-gray-700 pb-2">
                GPIO Configuration
            </h3>
            
            <!-- Printer TX GPIO -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label for="printer-tx-pin" class="form-label">Printer TX GPIO:</label>
                    <select id="printer-tx-pin" class="input-standard" 
                            x-model="$store.settings.config.device.printerTxPin"
                            x-effect="
                                if (!loading && $store.settings.config.device.printerTxPin !== null && $store.settings.printerGpioOptions.length > 0) {
                                    $nextTick(() => $el.value = $store.settings.config.device.printerTxPin);
                                }
                            ">
                        <template x-for="gpio in $store.settings.printerGpioOptions" :key="gpio.pin">
                            <option :value="gpio.pin" 
                                    :disabled="!gpio.available"
                                    x-text="`GPIO ${gpio.pin} - ${gpio.description}${!gpio.available ? ' (In Use)' : ''}`">
                            </option>
                        </template>
                    </select>
                    <p class="text-xs text-gray-500 dark:text-gray-400">
                        UART communication to thermal printer
                    </p>
                </div>

                <!-- LED Strip GPIO -->
                <div class="space-y-2" x-show="$store.settings.config?.leds?.enabled">
                    <label for="led-strip-pin" class="form-label">LED Strip GPIO:</label>
                    <select id="led-strip-pin" class="input-standard" 
                            x-model="$store.settings.config.leds.pin"
                            x-effect="
                                if (!loading && $store.settings.config.leds.pin !== null && $store.settings.gpioOptions.length > 0) {
                                    $nextTick(() => $el.value = $store.settings.config.leds.pin);
                                }
                            ">
                        <template x-for="gpio in $store.settings.gpioOptions" :key="gpio.pin">
                            <option :value="gpio.pin" 
                                    :disabled="!gpio.available"
                                    x-text="gpio.pin === -1 ? gpio.description : `GPIO ${gpio.pin} - ${gpio.description}${!gpio.available ? ' (In Use)' : ''}`">
                            </option>
                        </template>
                    </select>
                    <p class="text-xs text-gray-500 dark:text-gray-400">
                        Data pin for addressable LED strip
                    </p>
                </div>
            </div>

            <!-- Button GPIO Pins -->
            <div class="mt-6">
                <h4 class="text-md font-medium text-gray-700 dark:text-gray-300 mb-3">Button GPIO Pins</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <template x-for="buttonNum in [1, 2, 3, 4]" :key="buttonNum">
                        <div class="space-y-2">
                            <label :for="`device-button${buttonNum}-gpio`" class="form-label"
                                   x-text="`Button ${buttonNum}:`"></label>
                            <select :id="`device-button${buttonNum}-gpio`" class="input-standard"
                                    x-model="$store.settings.config.buttons[`button${buttonNum}`].gpio"
                                    x-effect="
                                        if (!loading && $store.settings.config.buttons[`button${buttonNum}`].gpio !== null && $store.settings.gpioOptions.length > 0) {
                                            $nextTick(() => $el.value = $store.settings.config.buttons[`button${buttonNum}`].gpio);
                                        }
                                    ">
                                <template x-for="gpio in $store.settings.gpioOptions" :key="gpio.pin">
                                    <option :value="gpio.pin" 
                                            :disabled="!gpio.available"
                                            x-text="gpio.pin === -1 ? gpio.description : `GPIO ${gpio.pin} - ${gpio.description}${!gpio.available ? ' (In Use)' : ''}`">
                                    </option>
                                </template>
                            </select>
                        </div>
                    </template>
                </div>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">
                    GPIO pins for hardware button inputs (pull-up enabled)
                </p>
            </div>
        </div>
    </div>
</div>
