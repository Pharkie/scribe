<div x-data="{}" x-show="$store.settings && !$store.settings.loading" x-transition.opacity.duration.300ms class="settings-section">
    <div class="settings-card settings-card-teal">
        <h2 class="settings-card-header settings-card-header-teal">
<span x-html="window.renderSectionIcon ? window.renderSectionIcon('arrowDownCircle') : '🎛️'"></span>
            <span>Button Actions</span>
        </h2>

        <div class="space-y-6">
            <template x-for="buttonNum in [1, 2, 3, 4]" :key="buttonNum">
                <div class="p-4 bg-orange-50 dark:bg-orange-900/20 rounded-xl">
                    <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">
                        <span x-text="`Button ${buttonNum}`"></span>
                        <span class="text-sm font-normal text-gray-600 dark:text-gray-400">
                            (GPIO <span
                                x-text="$store.settings.config.buttons[`button${buttonNum}`]?.gpio || '-1'"></span>)
                        </span>
                    </h3>

                    <!-- Short Press Row -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <!-- Short Press Action -->
                        <div class="space-y-2">
                            <label :for="`button${buttonNum}-short`" class="form-label">
                                Short Press Action:
                            </label>
                            <select :id="`button${buttonNum}-short`" class="input-standard"
                                x-model="$store.settings.config.buttons[`button${buttonNum}`].shortAction">
                                <option value="">None</option>
                                <option value="JOKE">Joke</option>
                                <option value="RIDDLE">Riddle</option>
                                <option value="QUOTE">Quote</option>
                                <option value="QUIZ">Quiz</option>
                                <option value="NEWS">News</option>
                                <option value="CHARACTER_TEST">Character Test</option>
                                <option value="UNBIDDEN_INK">Unbidden Ink</option>
                                <option value="MEMO1">Memo 1</option>
                                <option value="MEMO2">Memo 2</option>
                                <option value="MEMO3">Memo 3</option>
                                <option value="MEMO4">Memo 4</option>
                            </select>
                        </div>

                        <!-- Short Press MQTT Topic -->
                        <div class="space-y-2">
                            <label :for="`button${buttonNum}-short-mqtt`" class="form-label">
                                Short Press MQTT Topic:
                            </label>
                            <input :id="`button${buttonNum}-short-mqtt`" type="text" placeholder="Optional MQTT topic"
                                class="input-standard"
                                x-model="$store.settings.config.buttons[`button${buttonNum}`].shortMqttTopic">
                        </div>

                        <!-- Short Press LED Effect -->
                        <div class="space-y-2" x-show="$store.settings.config?.leds?.enabled">
                            <label :for="`button${buttonNum}-short-led`" class="form-label">
                                Short Press LED Effect:
                            </label>
                            <select :id="`button${buttonNum}-short-led`" class="input-standard"
                                x-model="$store.settings.config.buttons[`button${buttonNum}`].shortLedEffect">
                                <option value="chase_single">Chase Single (Green)</option>
                                <option value="chase">Chase (Multiple Colors)</option>
                                <option value="rainbow">Rainbow</option>
                                <option value="twinkle">Twinkle</option>
                                <option value="pulse">Pulse</option>
                                <option value="matrix">Matrix</option>
                                <option value="none">No Effect</option>
                            </select>
                        </div>
                    </div>

                    <!-- Long Press Row -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <!-- Long Press Action -->
                        <div class="space-y-2">
                            <label :for="`button${buttonNum}-long`" class="form-label">
                                Long Press Action:
                            </label>
                            <select :id="`button${buttonNum}-long`" class="input-standard"
                                x-model="$store.settings.config.buttons[`button${buttonNum}`].longAction">
                                <option value="">None</option>
                                <option value="JOKE">Joke</option>
                                <option value="RIDDLE">Riddle</option>
                                <option value="QUOTE">Quote</option>
                                <option value="QUIZ">Quiz</option>
                                <option value="NEWS">News</option>
                                <option value="CHARACTER_TEST">Character Test</option>
                                <option value="UNBIDDEN_INK">Unbidden Ink</option>
                                <option value="MEMO1">Memo 1</option>
                                <option value="MEMO2">Memo 2</option>
                                <option value="MEMO3">Memo 3</option>
                                <option value="MEMO4">Memo 4</option>
                            </select>
                        </div>

                        <!-- Long Press MQTT Topic -->
                        <div class="space-y-2">
                            <label :for="`button${buttonNum}-long-mqtt`" class="form-label">
                                Long Press MQTT Topic:
                            </label>
                            <input :id="`button${buttonNum}-long-mqtt`" type="text" placeholder="Optional MQTT topic"
                                class="input-standard"
                                x-model="$store.settings.config.buttons[`button${buttonNum}`].longMqttTopic">
                            <p class="text-xs text-gray-500 dark:text-gray-400">
                                Leave MQTT topic blank to print locally.
                            </p>
                        </div>

                        <!-- Long Press LED Effect -->
                        <div class="space-y-2" x-show="$store.settings.config?.leds?.enabled">
                            <label :for="`button${buttonNum}-long-led`" class="form-label">
                                Long Press LED Effect:
                            </label>
                            <select :id="`button${buttonNum}-long-led`" class="input-standard"
                                x-model="$store.settings.config.buttons[`button${buttonNum}`].longLedEffect">
                                <option value="chase_single">Chase Single (Green)</option>
                                <option value="chase">Chase (Multiple Colors)</option>
                                <option value="rainbow">Rainbow</option>
                                <option value="twinkle">Twinkle</option>
                                <option value="pulse">Pulse</option>
                                <option value="matrix">Matrix</option>
                                <option value="none">No Effect</option>
                            </select>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Hardware Button Configuration (Read-only) -->
            <div class="status-info-box">
                <div class="status-info-header">
                    <span class="text-2xl mr-2">📊</span>
                    <span>Hardware Button Configuration</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                    <div class="space-y-2">
                        <div>
                            <span class="font-medium text-gray-700 dark:text-gray-300">Button
                                Count:</span>
                            <span class="text-gray-800 dark:text-gray-200"
                                x-text="$store.settings.config.buttons?.count || '-'"></span>
                        </div>
                        <div>
                            <span class="font-medium text-gray-700 dark:text-gray-300">Debounce
                                Time:</span>
                            <span class="text-gray-800 dark:text-gray-200"
                                x-text="($store.settings.config.buttons?.debounce_time || '-') + ($store.settings.config.buttons?.debounce_time ? ' ms' : '')"></span>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div>
                            <span class="font-medium text-gray-700 dark:text-gray-300">Long Press
                                Time:</span>
                            <span class="text-gray-800 dark:text-gray-200"
                                x-text="($store.settings.config.buttons?.long_press_time || '-') + ($store.settings.config.buttons?.long_press_time ? ' ms' : '')"></span>
                        </div>
                        <div>
                            <span class="font-medium text-gray-700 dark:text-gray-300">Active
                                Low:</span>
                            <span class="text-gray-800 dark:text-gray-200"
                                x-text="$store.settings.config.buttons?.active_low ? 'Yes' : ($store.settings.config.buttons?.active_low === false ? 'No' : '-')"></span>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div>
                            <span class="font-medium text-gray-700 dark:text-gray-300">Min
                                Interval:</span>
                            <span class="text-gray-800 dark:text-gray-200"
                                x-text="($store.settings.config.buttons?.min_interval || '-') + ($store.settings.config.buttons?.min_interval ? ' ms' : '')"></span>
                        </div>
                        <div>
                            <span class="font-medium text-gray-700 dark:text-gray-300">Max Per
                                Minute:</span>
                            <span class="text-gray-800 dark:text-gray-200"
                                x-text="$store.settings.config.buttons?.max_per_minute || '-'"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
