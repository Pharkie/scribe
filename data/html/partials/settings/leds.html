<div x-data="{}" x-show="$store.settings && !$store.settings.loading" x-transition.opacity.duration.300ms class="settings-section">
    <div
        class="bg-purple-50 dark:bg-purple-900/20 border border-purple-200 dark:border-purple-700 shadow-2xl rounded-3xl p-8">
        <h2
            class="text-2xl font-bold text-purple-800 dark:text-purple-100 mb-6 flex items-center space-x-2">
<span x-html="window.renderSectionIcon ? window.renderSectionIcon('lightBulb') : '💡'"></span>
            <span>LEDs</span>
        </h2>

        <div class="space-y-6">
            <!-- Hardware Configuration -->
            <div class="border border-gray-200 dark:border-gray-600 rounded-xl p-4">
                <h3 class="text-lg font-medium text-gray-800 dark:text-gray-100 mb-4"
                    x-text="$store.settings.config.leds.pin === -1 ? 'Hardware Configuration (Not connected)' : `Hardware Configuration (GPIO ${$store.settings.config.leds.pin || 'Unknown'})`"></h3>
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label for="led-count"
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">LED
                            Count</label>
                        <input type="number" id="led-count" min="1" max="300" class="input-standard"
                            x-model="$store.settings.config.leds.count" placeholder="60">
                        <p class="text-xs text-gray-500 dark:text-gray-400">Number of LEDs in your
                            strip
                            (typically 30, 60, or 144 per meter)</p>
                    </div>
                </div>
            </div>

            <!-- System Settings -->
            <div class="border border-gray-200 dark:border-gray-600 rounded-xl p-4">
                <h3 class="text-lg font-medium text-gray-800 dark:text-gray-100 mb-4">System
                    Settings
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label for="led-brightness"
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                            Brightness (<span x-text="$store.settings.config.leds.brightness"></span>/255)
                        </label>
                        <input type="range" id="led-brightness" min="10" max="255" step="5"
                            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                            x-model="$store.settings.config.leds.brightness">
                        <p class="text-xs text-gray-500 dark:text-gray-400">Lower values save power
                            and reduce heat</p>
                    </div>
                    <div class="space-y-2">
                        <label for="led-refresh-rate"
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                            Refresh Rate (<span x-text="$store.settings.config.leds.refreshRate"></span> Hz)
                        </label>
                        <input type="range" id="led-refresh-rate" min="10" max="120" step="5"
                            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                            x-model="$store.settings.config.leds.refreshRate">
                        <p class="text-xs text-gray-500 dark:text-gray-400">Higher values make
                            animations smoother but use more CPU</p>
                    </div>
                </div>
            </div>

            <!-- LED Effect Playground -->
            <div class="border border-gray-200 dark:border-gray-600 rounded-xl p-4">
                <h3 class="text-lg font-medium text-gray-800 dark:text-gray-100 mb-4">Effect
                    Playground
                </h3>
                <!-- Effect Selection -->
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label for="led-effect-selector"
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                            Effect
                        </label>
                        <select id="led-effect-selector" class="input-standard"
                            x-model="$store.settings.selectedEffect" @change="$store.settings.initEffectParams()">
                            <option value="chase_single">Single Colour Chase</option>
                            <option value="rainbow">Rainbow Wave</option>
                            <option value="twinkle">Twinkle</option>
                            <option value="chase_multi">Multicolour Chase</option>
                            <option value="pulse">Pulse</option>
                            <option value="matrix">Matrix</option>
                        </select>
                    </div>

                    <!-- Generic Parameters -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <!-- Speed -->
                        <div class="space-y-2">
                            <label for="led-speed"
                                class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                Speed (10-100)
                            </label>
                            <input type="range" id="led-speed" min="10" max="100" step="10"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                x-model="$store.settings.effectParams.speed">
                            <div class="text-xs text-gray-500 text-center"
                                x-text="$store.settings.effectParams.speed">
                            </div>
                            <div class="text-xs text-gray-600 dark:text-gray-400 text-center mt-1"
                                x-text="$store.settings.getSpeedDescription()">
                            </div>
                        </div>

                        <!-- Intensity -->
                        <div class="space-y-2">
                            <label for="led-intensity"
                                class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                Intensity (10-100)
                            </label>
                            <input type="range" id="led-intensity" min="10" max="100" step="10"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                x-model="$store.settings.effectParams.intensity">
                            <div class="text-xs text-gray-500 text-center"
                                x-text="$store.settings.effectParams.intensity">
                            </div>
                            <div class="text-xs text-gray-600 dark:text-gray-400 text-center mt-1"
                                x-text="$store.settings.getIntensityDescription()">
                            </div>
                        </div>

                        <!-- Number of Cycles -->
                        <div class="space-y-2">
                            <label for="led-cycles"
                                class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                Number of Cycles (1-6)
                            </label>
                            <input type="range" id="led-cycles" min="1" max="6" step="1"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                x-model.number="$store.settings.effectParams.cycles">
                            <div class="text-xs text-gray-500 text-center"
                                x-text="$store.settings.effectParams.cycles">
                            </div>
                            <div class="text-xs text-gray-600 dark:text-gray-400 text-center mt-1"
                                x-text="$store.settings.getCyclesDescription()">
                            </div>
                        </div>
                    </div>

                    <!-- Effect-Specific Parameters -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <!-- Custom Slider 1 -->
                        <div class="space-y-2" x-show="$store.settings.getCustomSlider1Label()">
                            <label for="led-custom1"
                                class="block text-sm font-medium text-gray-700 dark:text-gray-300"
                                x-text="$store.settings.getCustomSlider1Label()">
                            </label>
                            <input type="range" id="led-custom1" :min="$store.settings.getCustomSlider1Range().min"
                                :max="$store.settings.getCustomSlider1Range().max"
                                :step="$store.settings.getCustomSlider1Range().step"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                x-model="$store.settings.effectParams.custom1">
                            <div class="text-xs text-gray-500 text-center"
                                x-text="$store.settings.effectParams.custom1">
                            </div>
                        </div>

                        <!-- Custom Slider 2 -->
                        <div class="space-y-2" x-show="$store.settings.getCustomSlider2Label()">
                            <label for="led-custom2"
                                class="block text-sm font-medium text-gray-700 dark:text-gray-300"
                                x-text="$store.settings.getCustomSlider2Label()">
                            </label>
                            <input type="range" id="led-custom2" :min="$store.settings.getCustomSlider2Range().min"
                                :max="$store.settings.getCustomSlider2Range().max"
                                :step="$store.settings.getCustomSlider2Range().step"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                x-model="$store.settings.effectParams.custom2">
                            <div class="text-xs text-gray-500 text-center"
                                x-text="$store.settings.effectParams.custom2">
                            </div>
                        </div>

                        <!-- Custom Slider 3 -->
                        <div class="space-y-2" x-show="$store.settings.getCustomSlider3Label()">
                            <label for="led-custom3"
                                class="block text-sm font-medium text-gray-700 dark:text-gray-300"
                                x-text="$store.settings.getCustomSlider3Label()">
                            </label>
                            <input type="range" id="led-custom3" :min="$store.settings.getCustomSlider3Range().min"
                                :max="$store.settings.getCustomSlider3Range().max"
                                :step="$store.settings.getCustomSlider3Range().step"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                x-model="$store.settings.effectParams.custom3">
                            <div class="text-xs text-gray-500 text-center"
                                x-text="$store.settings.effectParams.custom3">
                            </div>
                        </div>
                    </div>

                    <!-- Color Controls -->
                    <div x-show="$store.settings.showColorControls()">
                        <h4 class="text-md font-medium text-gray-700 dark:text-gray-300 mb-3">Colors</h4>
                        <template x-for="(colorName, colorIndex) in $store.settings.getColorNames()" :key="colorIndex">
                            <div class="space-y-3 mb-4">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300" 
                                       x-text="colorName"></label>
                                
                                <!-- Color Swatch Grid: 6 presets + 1 custom -->
                                <div class="grid grid-cols-7 gap-2">
                                    <!-- 6 Preset Color Swatches -->
                                    <template x-for="(preset, presetIndex) in $store.settings.colorPresets" :key="presetIndex">
                                        <button type="button" 
                                                class="w-10 h-10 rounded-lg border-2 transition-all duration-200 hover:scale-110"
                                                :style="`background-color: ${preset}`"
                                                :class="$store.settings.effectParams.colors[colorIndex] === preset ? 'border-gray-900 dark:border-gray-100 shadow-lg scale-110' : 'border-gray-300 dark:border-gray-600 hover:border-gray-400'"
                                                @click="$store.settings.selectColor(colorIndex, preset, 'preset')"
                                                :title="preset">
                                        </button>
                                    </template>
                                    
                                    <!-- Custom Color Picker -->
                                    <div class="text-center">
                                        <input type="color" 
                                               :id="`led-color-custom-${colorIndex}`"
                                               class="w-10 h-10 rounded-lg border-2 cursor-pointer transition-all duration-200 hover:scale-110 mb-1"
                                               :class="$store.settings.colorTypes[colorIndex] === 'custom' ? 'border-gray-900 dark:border-gray-100 shadow-lg scale-110' : 'border-gray-300 dark:border-gray-600 hover:border-gray-400'"
                                               :value="$store.settings.effectParams.colors[colorIndex]"
                                               @input="$store.settings.selectColor(colorIndex, $event.target.value, 'custom')"
                                               title="Custom color">
                                        <div class="text-xs text-gray-500 dark:text-gray-400 font-medium">Custom</div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Control Buttons -->
                    <div class="flex space-x-3 pt-4">
                        <button type="button" @click="$store.settings.testLedEffect($store.settings.selectedEffect)"
                            :disabled="$store.settings.testingEffect"
                            class="px-6 py-2 bg-purple-600 hover:bg-purple-700 disabled:bg-purple-400 text-white rounded-xl font-medium flex items-center space-x-2 transition-colors">
                            <span x-show="!$store.settings.testingEffect" class="flex items-center space-x-2">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                                <span>Test Effect</span>
                            </span>
                            <span x-show="$store.settings.testingEffect" class="flex items-center space-x-2">
                                <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>
                                <span>Testing...</span>
                            </span>
                        </button>
                        <button type="button" @click="$store.settings.turnOffLeds()"
                            class="px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-xl font-medium flex items-center space-x-2 transition-colors">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                <rect x="6" y="6" width="12" height="12"/>
                            </svg>
                            <span>Stop</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
