<div x-data="{}" x-show="$store.settings && !$store.settings.loading" x-transition.opacity.duration.300ms class="settings-section">
    <div class="settings-card settings-card-pink">
        <h2 class="settings-card-header settings-card-header-pink">
<span x-html="window.renderSectionIcon ? window.renderSectionIcon('pencil') : '📝'"></span>
            <span>Memos</span>
        </h2>

        <!-- Placeholder Documentation -->
        <div class="mb-6 p-4 bg-purple-50 dark:bg-purple-50/20 rounded-xl">
            <h3 class="text-lg font-semibold text-purple-800 dark:text-purple-200 mb-3">Available Placeholders</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
                <div class="space-y-1">
                    <p><code class="px-2 py-1 bg-gray-200 dark:bg-gray-700 rounded">[date]</code> → Current date (24Aug25)</p>
                    <p><code class="px-2 py-1 bg-gray-200 dark:bg-gray-700 rounded">[time]</code> → Current time (12:30)</p>
                    <p><code class="px-2 py-1 bg-gray-200 dark:bg-gray-700 rounded">[weekday]</code> → Day name (Sunday)</p>
                    <p><code class="px-2 py-1 bg-gray-200 dark:bg-gray-700 rounded">[uptime]</code> → Device uptime (2h13m)</p>
                    <p><code class="px-2 py-1 bg-gray-200 dark:bg-gray-700 rounded">[ip]</code> → Device IP address</p>
                </div>
                <div class="space-y-1">
                    <p><code class="px-2 py-1 bg-gray-200 dark:bg-gray-700 rounded">[mdns]</code> → mDNS hostname</p>
                    <p><code class="px-2 py-1 bg-gray-200 dark:bg-gray-700 rounded">[coin]</code> → Heads or Tails</p>
                    <p><code class="px-2 py-1 bg-gray-200 dark:bg-gray-700 rounded">[dice:n]</code> → Random 1-n (default 6)</p>
                    <p><code class="px-2 py-1 bg-gray-200 dark:bg-gray-700 rounded">[pick:a|b|c]</code> → Random choice</p>
                </div>
            </div>
        </div>

        <!-- Memo Text Areas -->
        <div class="space-y-6">
            <!-- Memo 1 -->
            <div class="space-y-2">
                <label for="memo-1" class="form-label">Memo 1:</label>
                <textarea 
                    id="memo-1" 
                    rows="4"
                    class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent text-gray-800 dark:text-gray-100 bg-white dark:bg-gray-700 resize-vertical"
                    placeholder="Enter memo 1 content with placeholders..."
                    x-model="$store.settings.config.memos.memo1"></textarea>
                <div :class="$store.settings.memo1CharacterClass" class="text-xs text-right font-mono">
                    <span x-text="$store.settings.memo1CharacterText"></span>
                </div>
            </div>

            <!-- Memo 2 -->
            <div class="space-y-2">
                <label for="memo-2" class="form-label">Memo 2:</label>
                <textarea 
                    id="memo-2" 
                    rows="4"
                    class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent text-gray-800 dark:text-gray-100 bg-white dark:bg-gray-700 resize-vertical"
                    placeholder="Enter memo 2 content with placeholders..."
                    x-model="$store.settings.config.memos.memo2"></textarea>
                <div :class="$store.settings.memo2CharacterClass" class="text-xs text-right font-mono">
                    <span x-text="$store.settings.memo2CharacterText"></span>
                </div>
            </div>

            <!-- Memo 3 -->
            <div class="space-y-2">
                <label for="memo-3" class="form-label">Memo 3:</label>
                <textarea 
                    id="memo-3" 
                    rows="4"
                    class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent text-gray-800 dark:text-gray-100 bg-white dark:bg-gray-700 resize-vertical"
                    placeholder="Enter memo 3 content with placeholders..."
                    x-model="$store.settings.config.memos.memo3"></textarea>
                <div :class="$store.settings.memo3CharacterClass" class="text-xs text-right font-mono">
                    <span x-text="$store.settings.memo3CharacterText"></span>
                </div>
            </div>

            <!-- Memo 4 -->
            <div class="space-y-2">
                <label for="memo-4" class="form-label">Memo 4:</label>
                <textarea 
                    id="memo-4" 
                    rows="4"
                    class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent text-gray-800 dark:text-gray-100 bg-white dark:bg-gray-700 resize-vertical"
                    placeholder="Enter memo 4 content with placeholders..."
                    x-model="$store.settings.config.memos.memo4"></textarea>
                <div :class="$store.settings.memo4CharacterClass" class="text-xs text-right font-mono">
                    <span x-text="$store.settings.memo4CharacterText"></span>
                </div>
            </div>
        </div>
    </div>
</div>
